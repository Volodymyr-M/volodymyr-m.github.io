faq:
  title: Visor Gantt — Preguntas frecuentes
  items:
    - question: ¿Qué es un visor Gantt?
      answer: Un visor Gantt es una herramienta que abre un archivo de diagrama de Gantt — generalmente un Microsoft Project .MPP o .XML — y muestra el proyecto como una línea de tiempo interactiva. Un visor real permite desplazarte por el cronograma, hacer zoom, expandir o contraer fases, y ver los detalles de las tareas como dependencias, fechas de inicio y fin, y recursos. Ingantt es un visor Gantt que funciona en Mac, iOS, iPad, Windows, Android y en el navegador, para abrir el mismo archivo en cualquier dispositivo.
    - question: ¿Cómo veo un diagrama de Gantt sin Microsoft Project?
      answer: Abre el archivo en Ingantt. Importa directamente el formato .MPP nativo de Microsoft Project y MS Project XML, así que un archivo recibido de un colega con MS Project se abre como un Gantt completamente interactivo — sin licencia de MS Project ni instalación de Windows. Usa la versión navegador para un uso puntual o instala la prueba gratuita de la app Mac, iOS, Windows o Android. Tareas, dependencias y la ruta crítica llegan intactas.
    - question: ¿Puedo ver un archivo .MPP en Mac?
      answer: Sí. Ingantt tiene una app macOS nativa que abre archivos .MPP y MS Project XML directamente en cualquier Mac reciente. No necesitas máquina virtual, Parallels ni instalación de Windows. Descarga Ingantt desde el Mac App Store, abre el .MPP y verás el Gantt completo con fases, tareas, dependencias y ruta crítica. Si no quieres instalar nada, la versión navegador funciona en Safari, Chrome o Firefox.
    - question: ¿Puedo ver un Gantt en iPhone o iPad?
      answer: Sí. Ingantt tiene apps iOS nativas para iPhone y iPad que abren archivos .MPP y MS Project XML igual que la versión Mac. En iPad obtienes una línea de tiempo Gantt a ancho completo con zoom por pellizco y desplazamiento táctil; en iPhone el diseño se adapta para que tareas e hitos sigan siendo legibles. Es la forma más rápida de mirar un Gantt que un compañero te ha enviado cuando estás lejos del escritorio.
    - question: ¿Hay un visor Gantt gratuito?
      answer: Ingantt ofrece una prueba gratuita de 7 días sin tarjeta de crédito. La prueba incluye la visualización y edición completas de archivos .MPP y MS Project XML en todas las plataformas — nada está bloqueado detrás de una "edición visor" vs "edición editor". Después de la prueba, los planes pagos empiezan en 5,99 €/usuario/mes. La mayoría de las necesidades puntuales de visualización caben dentro de la prueba gratuita.
    - question: ¿Puedo ver un Gantt en el navegador sin instalar nada?
      answer: Sí. Ingantt tiene una versión navegador que abre archivos Gantt en Chrome, Safari, Firefox o Edge sobre Mac, Windows, Linux, Chromebook o móvil. Inicia sesión con una cuenta Google, abre un archivo .MPP desde Google Drive o súbelo, y el Gantt se carga en el navegador con zoom, desplazamiento y detalles al pasar el cursor. Nada se instala, nada se descarga.
    - question: ¿Necesito conocimientos de gestión de proyectos?
      answer: No. Ingantt está diseñado para que un no experto — un directivo revisando una fecha de entrega, un cliente comprobando un hito, un nuevo miembro del equipo orientándose — pueda abrir un Gantt y leerlo sin aprender nada. Desplázate por la línea de tiempo para ver cuándo ocurren las cosas, pasa el cursor sobre una tarea para ver quién la hace, expande una fase para ver su contenido. Sin jerga ni configuración.
    - question: ¿Puedo imprimir o compartir el Gantt que estoy viendo?
      answer: Sí. Ingantt exporta el Gantt a PDF o PNG para imprimirlo, adjuntarlo a un email o incluirlo en una presentación. La exportación PDF conserva el diseño de la línea de tiempo a cualquier nivel de zoom, útil para entregar una versión de solo lectura a un interesado. Si necesitas volver a abrir el mismo .MPP en otro sitio más tarde, consulta nuestra guía para <a href="/open-mpp-file">abrir archivos .MPP sin Microsoft Project</a>.
