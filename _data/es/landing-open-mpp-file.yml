faq:
  title: Abrir archivos .MPP — preguntas cuando estás bloqueado
  items:
    - question: ¿Cómo abro un archivo .MPP?
      answer: Lo más rápido es abrir el archivo en Ingantt. Un archivo .MPP es el formato binario nativo de Microsoft Project, y por defecto solo Microsoft Project lo abre limpiamente — pero MS Project solo funciona en Windows, cuesta varios cientos de euros y probablemente no es lo que quieres comprar por un solo archivo. Ingantt importa .MPP directamente, funciona en Mac, iPhone, iPad, Windows, Android y en el navegador, con una prueba gratuita de 7 días sin tarjeta. Abre la app, suelta el .MPP y el proyecto completo aparece en unos 30 segundos.
    - question: ¿Cómo abro un archivo .MPP sin Microsoft Project?
      answer: Usa Ingantt. Lee el formato binario .MPP directamente — sin licencia de Microsoft Project, sin máquina virtual Windows, sin servicio de conversión que te mande un PDF por email. Ingantt importa cada tarea, subtarea, dependencia, asignación de recursos, hito y la ruta crítica, y muestra el proyecto como un diagrama de Gantt completo. La prueba gratuita de 7 días cubre la mayoría de situaciones puntuales, sin tarjeta de crédito.
    - question: ¿Cómo abro un archivo .MPP en Mac?
      answer: Microsoft Project no funciona en macOS — no hay versión Mac. La respuesta no es "instala Project en Mac" sino "usa algo que lea .MPP de forma nativa en Mac". Ingantt tiene una app macOS nativa en el Mac App Store que abre archivos .MPP directamente en Mac Apple Silicon e Intel. Descárgala, abre el .MPP y verás el Gantt completo con tareas, dependencias y ruta crítica. Si no quieres instalar nada, la versión navegador funciona igual en Safari, Chrome o Firefox.
    - question: ¿Puedo abrir un archivo .MPP en iPhone o iPad?
      answer: Sí. Ingantt tiene apps iOS nativas para iPhone e iPad en la App Store que abren archivos .MPP y MS Project XML directamente. En iPad obtienes una línea de tiempo amplia con zoom por pellizco y desplazamiento táctil — lo más cercano a la experiencia de Microsoft Project de escritorio en un dispositivo iOS. En iPhone el diseño se adapta a la pantalla más pequeña para que tareas, fechas e hitos sigan siendo legibles. Suele ser la forma más rápida de abrir un .MPP que un compañero acaba de enviarte.
    - question: ¿Puedo abrir un archivo .MPP online en el navegador?
      answer: Sí. Ingantt tiene una versión navegador que abre archivos .MPP en Chrome, Safari, Firefox o Edge sobre Mac, Windows, Linux, Chromebook o móvil. Inicia sesión con una cuenta Google, sube el .MPP o selecciónalo desde Google Drive, y el proyecto completo se abre en el navegador. Nada se instala localmente. Es la opción correcta en un equipo de trabajo donde no se puede instalar software, o en Linux/Chromebook donde Microsoft Project nunca fue una opción.
    - question: ¿Hay una forma gratuita de abrir archivos .MPP?
      answer: Ingantt ofrece una prueba gratuita de 7 días sin tarjeta de crédito, y la prueba incluye la importación y edición completa de .MPP — nada está bloqueado. Para quien solo necesita abrir un .MPP una o un par de veces, la prueba cubre la situación por completo. Después, los planes pagos empiezan en 5,99 €/usuario/mes. Si trabajas con .MPP regularmente, el plan es menos de un mes de Microsoft 365 Project.
    - question: ¿Perderé dependencias, recursos o la ruta crítica?
      answer: En Ingantt no — la importación es sin pérdidas en los campos que importan. Tareas, subtareas, dependencias finish-to-start, asignaciones de recursos, trabajo y duración, hitos y el cálculo de la ruta crítica llegan todos desde el archivo .MPP original. Ingantt usa la misma estructura de proyecto que Microsoft Project internamente, así que un Gantt que costó una tarde construir en Project se ve igual al abrirlo en Ingantt. Los visores gratuitos que solo muestran listas de tareas o aplanan el proyecto pierden el grafo de dependencias.
    - question: ¿Puedo volver a guardar el archivo .MPP después de abrirlo?
      answer: Sí. Ingantt guarda los proyectos de vuelta en el formato nativo .MPP de Microsoft Project, además de .XML, PDF y PNG. Puedes abrir un .MPP en Mac, iPhone o en el navegador, editarlo, guardarlo como .MPP y entregárselo a un colega que siga usando Microsoft Project — lo abrirá como siempre. Si solo quieres mirar el diagrama sin editarlo, nuestra página de <a href="/gantt-viewer">Visor Gantt</a> cubre el caso de solo lectura.
