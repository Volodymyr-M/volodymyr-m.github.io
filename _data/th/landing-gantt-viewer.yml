faq:
  title: โปรแกรมดูแกนต์ — คำถามที่พบบ่อย
  items:
    - question: ฉันจะดูแกนต์ชาร์ตโดยไม่ใช้ Microsoft Project ได้อย่างไร?
      answer: เปิดไฟล์ใน Ingantt มันนำเข้ารูปแบบ .MPP ดั้งเดิมของ Microsoft Project และ MS Project XML โดยตรง ดังนั้นไฟล์จากเพื่อนร่วมงานที่ใช้ MS Project จะเปิดเป็นแกนต์ชาร์ตแบบโต้ตอบเต็มรูปแบบ — โดยไม่ต้องมีใบอนุญาต MS Project หรือการติดตั้ง Windows งาน ความสัมพันธ์ และเส้นทางวิกฤตยังคงอยู่ครบ
    - question: มีโปรแกรมดูแกนต์ฟรีหรือไม่?
      answer: Ingantt มีทดลองใช้ฟรี 7 วันโดยไม่ต้องใช้บัตรเครดิต การทดลองรวมการดูและแก้ไขไฟล์ .MPP และ MS Project XML อย่างเต็มรูปแบบบนทุกแพลตฟอร์ม หลังการทดลอง แผนแบบชำระเงินเริ่มต้นที่ $5.99 ต่อผู้ใช้ต่อเดือน
    - question: ฉันสามารถพิมพ์หรือแชร์แกนต์ชาร์ตที่ฉันกำลังดูได้หรือไม่?
      answer: ได้ Ingantt ส่งออกแกนต์ชาร์ตเป็น PDF หรือ PNG เพื่อพิมพ์ แนบไปกับอีเมล หรือวางลงในสไลด์ การส่งออก PDF รักษาเค้าโครงเส้นเวลาที่ระดับซูมใดก็ได้ หากคุณต้องการเปิด .MPP เดียวกันในที่อื่นในภายหลัง ดูคู่มือของเราเกี่ยวกับ <a href="/open-mpp-file">การเปิดไฟล์ .MPP โดยไม่ใช้ Microsoft Project</a>
