faq:
  title: แกนต์ชาร์ต AI — คำถามที่พบบ่อย
  items:
    - question: AI สร้างแกนต์ชาร์ตได้จริงหรือไม่?
      answer: ใช่ AI ของ Ingantt สร้างแกนต์ชาร์ตแบบครบถ้วนจากคำอธิบายโครงการด้วยภาษาธรรมดา รวมถึงงาน งานย่อย ความสัมพันธ์ ระยะเวลา และเหตุการณ์สำคัญ คุณอธิบายเป้าหมายในหนึ่งหรือสองประโยค AI จะสร้างแผนภายในประมาณ 30 วินาที และคุณสามารถแก้ไขต่อได้
    - question: AI สร้างแกนต์ชาร์ตอย่างไร?
      answer: Ingantt ส่งคำอธิบายของคุณไปยังโมเดลภาษาที่ฝึกด้วยรูปแบบการจัดการโครงการ โมเดลจะแบ่งงานเป็นเฟสและงาน เลือกระยะเวลาที่เหมาะสม เชื่อมโยงความสัมพันธ์ และแสดงผลเป็นแกนต์ชาร์ตที่แก้ไขได้จริง — ไม่ใช่ภาพนิ่ง
    - question: แกนต์ชาร์ต AI ดีกว่าเทมเพลตหรือไม่?
      answer: เทมเพลตเป็นแบบทั่วไป แต่แกนต์ชาร์ต AI ถูกปรับแต่งให้ตรงกับโครงการของคุณในขั้นตอนเดียว การใช้เทมเพลตคุณต้องเปลี่ยนชื่องาน ปรับระยะเวลา และเพิ่มความสัมพันธ์เอง AI ทำทั้งหมดจากพรอมต์ และผลลัพธ์ยังคงแก้ไขได้เต็มที่
    - question: ChatGPT สร้างแกนต์ชาร์ตได้หรือไม่?
      answer: ChatGPT สามารถอธิบายแผนโครงการเป็นข้อความได้ แต่ไม่สามารถสร้างแกนต์ชาร์ตแบบโต้ตอบที่แก้ไขได้พร้อมความสัมพันธ์จริง เหตุการณ์สำคัญ และการจัดสรรทรัพยากร AI ของ Ingantt ทำได้ — และบันทึกผลลัพธ์เป็นไฟล์ .MPP ที่เข้ากันได้กับ Microsoft Project
    - question: ฉันสามารถแก้ไขสิ่งที่ AI สร้างได้หรือไม่?
      answer: ได้ แกนต์ชาร์ตทุกอันที่ AI สร้างสามารถแก้ไขได้เต็มที่ ลากงาน ปรับระยะเวลา เพิ่มหรือลบความสัมพันธ์ จัดสรรทรัพยากรใหม่ หรือขอให้ AI แก้ไขส่วนใดส่วนหนึ่ง
    - question: มีการทดลองใช้ฟรีหรือไม่?
      answer: ใช่ การทดลองใช้ฟรี 7 วัน รวมถึงการสร้างโครงการด้วย AI แบบไม่จำกัด การแก้ไขเต็มรูปแบบ การนำเข้า/ส่งออก MS Project และการผสานรวม Google Drive ไม่ต้องใช้บัตรเครดิต
