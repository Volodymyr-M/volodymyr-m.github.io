faq:
  title: Gantt Chart AI — Pertanyaan Umum
  items:
    - question: Apakah AI benar-benar bisa membuat Gantt chart?
      answer: Ya. AI Ingantt menghasilkan Gantt chart lengkap dari deskripsi proyek dalam bahasa alami, termasuk tugas, sub-tugas, dependensi, durasi, dan tonggak. Anda menjelaskan tujuan dalam satu atau dua kalimat, AI membuat rencana dalam sekitar 30 detik, dan Anda mengeditnya setelahnya.
    - question: Bagaimana AI menghasilkan Gantt chart?
      answer: Ingantt mengirim deskripsi Anda ke model bahasa yang dilatih pada pola manajemen proyek. Model memecah pekerjaan menjadi fase dan tugas, memilih durasi yang realistis, menghubungkan dependensi, dan merender hasil sebagai Gantt chart yang benar-benar dapat diedit — bukan gambar statis.
    - question: Apakah Gantt chart AI lebih baik dari template?
      answer: Template bersifat umum; Gantt chart AI disesuaikan dengan proyek Anda dalam satu langkah. Dengan template, Anda masih harus mengganti nama tugas, menyesuaikan durasi, dan menambah dependensi sendiri. AI melakukan semuanya dari prompt, dan hasilnya tetap sepenuhnya dapat diedit.
    - question: Bisakah ChatGPT membuat Gantt chart?
      answer: ChatGPT dapat menggambarkan rencana proyek dalam teks, tetapi tidak dapat menghasilkan Gantt chart interaktif yang dapat diedit dengan dependensi nyata, tonggak, dan alokasi sumber daya. AI Ingantt bisa — dan menyimpan hasilnya sebagai file .MPP yang kompatibel dengan Microsoft Project.
    - question: Bisakah saya mengedit apa yang dibuat AI?
      answer: Ya. Setiap Gantt chart yang dihasilkan AI sepenuhnya dapat diedit. Seret tugas, sesuaikan durasi, tambah atau hapus dependensi, alokasikan ulang sumber daya, atau minta AI untuk merevisi bagian tertentu.
    - question: Apakah ada uji coba gratis?
      answer: Ya. Uji coba gratis 7 hari mencakup pembuatan proyek AI tanpa batas, pengeditan penuh, impor/ekspor MS Project, dan integrasi Google Drive. Tanpa kartu kredit.
