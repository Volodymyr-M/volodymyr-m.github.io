    meta_description: Syarat Layanan Ingantt
    text_title: Syarat Layanan
    text: |
      **Last Updated: February 22, 2026**

      Syarat Layanan ("Syarat") ini mengatur akses dan penggunaan Anda terhadap Ingantt ("Aplikasi," "Layanan"), sebuah aplikasi penjadwalan proyek yang disediakan oleh Ingantt Development ("kami," "milik kami"). Dengan mengakses atau menggunakan Aplikasi, Anda setuju untuk terikat oleh Syarat ini. Jika Anda tidak setuju, jangan gunakan Aplikasi.

      ## 1. Deskripsi Layanan

      Ingantt adalah aplikasi penjadwalan proyek lintas platform yang menyediakan:

      - Penjadwalan proyek menggunakan algoritma Critical Path Method (CPM)
      - Manajemen tugas dengan dependensi, batasan, dan penugasan sumber daya
      - Visualisasi dan rendering Gantt chart
      - Manajemen sumber daya dan pemerataan sumber daya
      - Manajemen kalender dan jadwal kerja
      - Impor dan ekspor proyek dalam format XML (kompatibel dengan Microsoft Project), CSV, PDF, dan Markdown
      - Konversi file Microsoft Project (.mpp) melalui server kami
      - Integrasi Google Drive untuk penyimpanan dan berbagi file
      - Pembuatan proyek berbasis AI ("Create with AI")

      Aplikasi tersedia di Web (web.ingantt.com dan melalui Google Workspace Marketplace), iOS, Android, macOS, dan Windows.

      ## 2. Kelayakan

      Anda harus berusia minimal 13 tahun untuk menggunakan Aplikasi. Jika Anda berusia antara 13 dan 18 tahun, Anda harus memiliki persetujuan orang tua atau wali. Dengan menggunakan Aplikasi, Anda menyatakan dan menjamin bahwa Anda memenuhi persyaratan ini.

      ## 3. Akun dan Autentikasi

      ### 3.1 Google Sign-In

      Versi web Aplikasi memerlukan Google Sign-In untuk autentikasi. Pada platform lain, Google Sign-In mungkin tersedia untuk fitur seperti integrasi Google Drive. Dengan masuk, Anda mengizinkan kami untuk mengakses informasi profil dasar Anda (nama dan alamat email) untuk identifikasi akun, manajemen lisensi, dan penyediaan layanan.

      ### 3.2 Keamanan Akun

      Anda bertanggung jawab untuk menjaga keamanan kredensial akun Google Anda. Anda setuju untuk segera memberitahu kami di support@ingantt.com mengenai penggunaan akun Anda yang tidak sah.

      ## 4. Pembelian dan Pembayaran

      ### 4.1 Model Pembelian

      Aplikasi menggunakan model pembelian yang berbeda tergantung pada platform:

      - **Web (web.ingantt.com dan Google Workspace Marketplace):** Aplikasi beroperasi berdasarkan langganan dengan paket bulanan dan tahunan. Uji coba gratis mungkin tersedia untuk pengguna baru. Fitur tertentu memerlukan langganan aktif untuk diakses.
      - **iOS (App Store), Android (Google Play), macOS (App Store), dan Windows (Microsoft Store):** Aplikasi tersedia sebagai pembelian satu kali. Semua fitur termasuk dalam pembelian Anda. Tidak diperlukan pembelian dalam aplikasi atau langganan.

      ### 4.2 Detail Langganan Web

      Untuk versi web Aplikasi:

      - **Uji Coba Gratis:** Pengguna baru dapat menerima periode uji coba gratis dengan akses ke fitur-fitur Aplikasi. Periode uji coba dimulai saat penggunaan pertama.
      - **Paket Langganan:** Setelah periode uji coba, akses berkelanjutan memerlukan langganan aktif (bulanan atau tahunan). Harga ditampilkan di dalam Aplikasi.
      - **Perpanjangan Otomatis:** Langganan diperpanjang secara otomatis pada akhir setiap periode penagihan kecuali dibatalkan sebelum tanggal perpanjangan.
      - **Pembatalan:** Anda dapat membatalkan langganan Anda kapan saja melalui Aplikasi atau dengan menghubungi support@ingantt.com. Pembatalan berlaku pada akhir periode penagihan saat ini.

      ### 4.3 Pemrosesan Pembayaran

      Pembayaran diproses melalui platform yang berlaku:

      - **iOS dan macOS (App Store):** Dikelola melalui Apple dan tunduk pada syarat Apple
      - **Android (Google Play):** Dikelola melalui Google Play dan tunduk pada syarat Google
      - **Windows (Microsoft Store):** Dikelola melalui Microsoft dan tunduk pada syarat Microsoft
      - **Web:** Dikelola melalui pemroses pembayaran pihak ketiga kami (WayForPay) dan tunduk pada syarat mereka

      ### 4.4 Pengembalian Dana

      Kebijakan pengembalian dana diatur oleh platform tempat Anda melakukan pembelian:

      - **Apple App Store:** Tunduk pada kebijakan pengembalian dana Apple
      - **Google Play Store:** Tunduk pada kebijakan pengembalian dana Google
      - **Microsoft Store:** Tunduk pada kebijakan pengembalian dana Microsoft
      - **Web:** Hubungi support@ingantt.com untuk permintaan pengembalian dana dalam 7 hari setelah pembelian

      ## 5. Konten dan Data Pengguna

      ### 5.1 File Proyek Anda

      Anda mempertahankan kepemilikan penuh atas semua file proyek, jadwal, dan data yang Anda buat atau impor menggunakan Aplikasi ("Konten Pengguna"). Kami tidak mengklaim hak kepemilikan apa pun atas Konten Pengguna Anda.

      ### 5.2 Penyimpanan Lokal

      File proyek dapat disimpan secara lokal di perangkat Anda. Anda bertanggung jawab untuk memelihara cadangan file lokal Anda. Kami tidak bertanggung jawab atas kehilangan data yang diakibatkan oleh kegagalan perangkat, penghapusan instalasi aplikasi, atau kejadian lain di luar kendali kami.

      ### 5.3 Penyimpanan Google Drive

      Jika Anda memilih untuk menggunakan integrasi Google Drive, file Anda disimpan dalam folder bernama "Ingantt Schedules" di akun Google Drive pribadi Anda dan tunduk pada Syarat Layanan dan Kebijakan Privasi Google. Aplikasi menggunakan cakupan terbatas `drive.file`, yang berarti hanya dapat mengakses file yang dibuatnya atau file yang secara eksplisit Anda buka di Aplikasi — Aplikasi tidak memiliki akses ke seluruh Google Drive Anda. Kami mengakses Google Drive Anda hanya untuk membaca, menulis, dan mengelola file proyek sesuai arahan Anda.

      ### 5.4 Simpan Otomatis

      Aplikasi dapat secara otomatis menyimpan pekerjaan Anda ke penyimpanan internal sebagai langkah pengamanan terhadap kehilangan data. Data yang disimpan otomatis disimpan secara lokal di perangkat Anda.

      ### 5.5 Data yang Kami Kumpulkan

      Dalam rangka menyediakan Layanan, kami dapat mengumpulkan dan memproses:

      - Alamat email dan nama Anda (untuk autentikasi dan manajemen lisensi)
      - Informasi pembayaran (diproses oleh penyedia pembayaran pihak ketiga; kami tidak menyimpan detail pembayaran lengkap)
      - Data penggunaan dan error aplikasi (untuk pelaporan kerusakan dan peningkatan stabilitas)
      - Prompt AI yang Anda kirimkan saat menggunakan fitur "Create with AI" (diteruskan ke penyedia AI pihak ketiga, tidak disimpan di server kami)
      - Umpan balik yang Anda kirimkan, yang mungkin menyertakan lampiran file proyek

      Untuk detail lengkap tentang pengumpulan dan penggunaan data, silakan tinjau [Kebijakan Privasi](privacy_policy.html) kami.

      ## 6. Fitur Bertenaga AI

      ### 6.1 Create with AI

      Aplikasi menawarkan pembuatan proyek bertenaga AI. Saat Anda menggunakan fitur ini:

      - Prompt teks Anda dikirim ke server kami, yang meneruskannya ke Anthropic (Claude) untuk diproses. Kami tidak menyimpan prompt Anda di server kami. Pemrosesan prompt Anda oleh Anthropic tunduk pada syarat layanan dan kebijakan privasi mereka.
      - Jadwal proyek yang dihasilkan disediakan sebagai titik awal dan harus ditinjau keakuratannya
      - Kami tidak menjamin keakuratan, kelengkapan, atau kesesuaian konten yang dihasilkan AI
      - Anda sepenuhnya bertanggung jawab untuk meninjau dan memvalidasi jadwal yang dihasilkan AI sebelum mengandalkannya

      ### 6.2 Bukan Saran Profesional

      Konten yang dihasilkan AI bukan merupakan saran manajemen proyek profesional. Anda harus menggunakan penilaian independen saat menggunakan rencana proyek yang dihasilkan AI.

      ## 7. Kompatibilitas Microsoft Project

      ### 7.1 Dukungan Format File

      Aplikasi mendukung impor dan ekspor file XML yang kompatibel dengan Microsoft Project. Aplikasi juga dapat mengonversi berbagai format file proyek (termasuk .mpp, .mpt, .mpx, .gan, .xer, dan lainnya) ke XML melalui layanan konversi sisi server kami. File yang diunggah diproses di memori dan tidak disimpan di server kami.

      ### 7.2 Penyangkalan Kompatibilitas

      Meskipun kami berusaha untuk kompatibilitas dengan format file Microsoft Project, kami tidak menjamin kesetiaan sempurna dalam semua kasus. Beberapa fitur, pemformatan, atau data yang ada di file Microsoft Project mungkin tidak sepenuhnya didukung. Anda harus memverifikasi file yang dikonversi untuk keakuratannya.

      ### 7.3 Tanpa Afiliasi

      Ingantt tidak berafiliasi dengan, didukung oleh, atau disponsori oleh Microsoft Corporation. "Microsoft Project" adalah merek dagang dari Microsoft Corporation.

      ## 8. Penggunaan yang Dapat Diterima

      Anda setuju untuk tidak:

      - Menggunakan Aplikasi untuk tujuan yang melanggar hukum atau melanggar hukum yang berlaku
      - Mencoba merekayasa balik, mendekompilasi, atau membongkar Aplikasi
      - Mengelakkan pembatasan akses, pemeriksaan langganan, atau langkah-langkah keamanan apa pun
      - Mengganggu atau mengacaukan server atau infrastruktur Aplikasi
      - Menggunakan cara otomatis untuk mengakses Aplikasi di luar antarmuka yang dimaksudkan
      - Mendistribusikan ulang, mensublisensikan, atau menjual kembali Aplikasi atau bagian darinya
      - Menggunakan Aplikasi untuk mengirimkan malware, virus, atau kode berbahaya lainnya
      - Menyalahgunakan fitur AI untuk menghasilkan konten yang berbahaya, ilegal, atau tidak pantas

      ## 9. Kekayaan Intelektual

      ### 9.1 Hak Kami

      Aplikasi, termasuk kode, desain, algoritma, antarmuka pengguna, dokumentasi, dan mereknya, adalah kekayaan intelektual dari Ingantt Development dan dilindungi oleh hak cipta, merek dagang, dan hukum kekayaan intelektual lainnya yang berlaku.

      ### 9.2 Lisensi Terbatas

      Kami memberikan Anda lisensi terbatas, non-eksklusif, tidak dapat dipindahtangankan, dan dapat dicabut untuk menggunakan Aplikasi sesuai dengan Syarat ini dan status pembelian atau langganan Anda.

      ## 10. Layanan Pihak Ketiga

      Aplikasi terintegrasi dengan layanan pihak ketiga termasuk namun tidak terbatas pada:

      - **Google** (Sign-In, Drive, OAuth2, Workspace Marketplace, Analytics)
      - **Apple** (App Store)
      - **Google Play** (Google Play Store)
      - **Microsoft** (Microsoft Store)
      - **WayForPay** (pemrosesan pembayaran untuk langganan web)
      - **Anthropic (Claude)** (pembuatan proyek bertenaga AI)
      - **Sentry** (pelaporan error sisi klien)
      - **Resend** (pengiriman email transaksional untuk langganan web)
      - **Microsoft Azure** (hosting server, penyimpanan data, dan pemantauan aplikasi)

      Penggunaan Anda atas layanan pihak ketiga ini tunduk pada syarat layanan dan kebijakan privasi masing-masing. Kami tidak bertanggung jawab atas ketersediaan, keakuratan, atau praktik layanan pihak ketiga.

      ## 11. Cookie dan Analitik

      Versi web Aplikasi menggunakan Google Analytics 4 untuk mengumpulkan analitik penggunaan standar seperti tampilan halaman dan data sesi. Google Analytics dapat menyetel cookie di browser Anda. Anda dapat menggunakan pemblokiran cookie berbasis browser atau alat opt-out untuk membatasi pengumpulan data ini. Versi mobile dan desktop native Aplikasi tidak menggunakan cookie atau pelacakan analitik.

      ## 12. Komitmen Perlindungan Data

      - Kami tidak menggunakan data Anda untuk melatih model kecerdasan buatan atau pembelajaran mesin.
      - Kami tidak menjual informasi pribadi Anda kepada pihak ketiga.
      - Data Anda dapat ditransfer ke dan diproses di Amerika Serikat (tempat server backend kami dihosting di Microsoft Azure, wilayah East US) dan UE (tempat laporan kerusakan sisi klien diproses oleh Sentry). Dengan menggunakan Aplikasi, Anda menyetujui transfer ini.

      Untuk detail lengkap, silakan tinjau [Kebijakan Privasi](privacy_policy.html) kami.

      ## 13. Komunikasi Email

      Dengan menggunakan versi web Aplikasi dan membuat akun, Anda setuju untuk menerima email transaksional terkait akun dan langganan Anda, termasuk:

      - Pesan selamat datang dan orientasi
      - Pemberitahuan berakhirnya uji coba
      - Konfirmasi aktivasi dan pembatalan langganan

      Ini adalah komunikasi terkait layanan yang diperlukan untuk pengoperasian akun Anda, bukan email pemasaran.

      ## 14. Penghapusan Data

      Anda dapat meminta penghapusan akun dan data terkait Anda dengan menghubungi support@ingantt.com. Setelah menerima permintaan yang valid, kami akan menghapus informasi akun Anda dari server kami. Harap diperhatikan bahwa:

      - File yang disimpan di Google Drive Anda dikelola oleh Anda dan tidak terpengaruh oleh penghapusan akun
      - File yang disimpan secara lokal di perangkat Anda tidak terpengaruh oleh penghapusan akun
      - Kami dapat menyimpan data tertentu sebagaimana diwajibkan oleh hukum atau untuk tujuan bisnis yang sah (seperti catatan pembayaran)

      ## 15. Ketersediaan Layanan

      ### 15.1 Tidak Ada Jaminan Ketersediaan

      Kami berusaha untuk menjaga ketersediaan Aplikasi tetapi tidak menjamin layanan yang tidak terputus atau bebas kesalahan. Aplikasi, termasuk fitur yang bergantung pada server (konversi file, pembuatan proyek AI), mungkin tidak tersedia sementara karena pemeliharaan, pembaruan, atau keadaan di luar kendali kami.

      ### 15.2 Modifikasi Layanan

      Kami berhak untuk memodifikasi, menangguhkan, atau menghentikan bagian mana pun dari Layanan kapan saja, dengan atau tanpa pemberitahuan. Kami akan melakukan upaya yang wajar untuk memberi tahu pengguna tentang perubahan signifikan.

      ## 16. Penafian Jaminan

      APLIKASI DISEDIAKAN "SEBAGAIMANA ADANYA" DAN "SEBAGAIMANA TERSEDIA" TANPA JAMINAN APA PUN, BAIK TERSURAT MAUPUN TERSIRAT, TERMASUK NAMUN TIDAK TERBATAS PADA JAMINAN TERSIRAT TENTANG KELAYAKAN UNTUK DIPERJUALBELIKAN, KESESUAIAN UNTUK TUJUAN TERTENTU, DAN NON-PELANGGARAN.

      KAMI TIDAK MENJAMIN BAHWA:

      - APLIKASI AKAN MEMENUHI PERSYARATAN SPESIFIK ANDA
      - APLIKASI AKAN TIDAK TERPUTUS, TEPAT WAKTU, AMAN, ATAU BEBAS KESALAHAN
      - PERHITUNGAN PENJADWALAN, ANALISIS JALUR KRITIS, ATAU HASIL PEMERATAAN SUMBER DAYA AKAN AKURAT ATAU LENGKAP
      - KONTEN YANG DIHASILKAN AI AKAN AKURAT, SESUAI, ATAU BEBAS DARI KESALAHAN
      - KONVERSI FILE AKAN MEMPERTAHANKAN SEMUA DATA DENGAN KESETIAAN SEMPURNA

      ## 17. Batasan Tanggung Jawab

      SEJAUH YANG DIIZINKAN OLEH HUKUM YANG BERLAKU, DALAM KEADAAN APA PUN INGANTT DEVELOPMENT TIDAK BERTANGGUNG JAWAB ATAS KERUSAKAN TIDAK LANGSUNG, INSIDENTAL, KHUSUS, KONSEKUENSIAL, ATAU HUKUMAN, TERMASUK NAMUN TIDAK TERBATAS PADA:

      - KEHILANGAN DATA ATAU FILE PROYEK
      - GANGGUAN BISNIS ATAU KEHILANGAN KEUNTUNGAN
      - KERUSAKAN YANG TIMBUL DARI KETERGANTUNGAN PADA PERHITUNGAN PENJADWALAN ATAU KONTEN YANG DIHASILKAN AI
      - KERUSAKAN YANG TIMBUL DARI KEGAGALAN LAYANAN PIHAK KETIGA

      TOTAL TANGGUNG JAWAB AGREGAT KAMI TIDAK AKAN MELEBIHI JUMLAH YANG ANDA BAYARKAN UNTUK APLIKASI DALAM DUA BELAS (12) BULAN SEBELUM KLAIM.

      ## 18. Ganti Rugi

      Anda setuju untuk mengganti rugi, membela, dan membebaskan Ingantt Development dari segala klaim, kerusakan, kerugian, kewajiban, dan biaya (termasuk biaya pengacara yang wajar) yang timbul dari:

      - Penggunaan Anda atas Aplikasi
      - Pelanggaran Anda terhadap Syarat ini
      - Pelanggaran Anda terhadap hukum yang berlaku atau hak pihak ketiga
      - Konten Pengguna Anda

      ## 19. Pengakhiran

      ### 19.1 Oleh Anda

      Anda dapat berhenti menggunakan Aplikasi kapan saja. Jika Anda memiliki langganan web, Anda dapat membatalkannya mengikuti prosedur yang dijelaskan dalam Bagian 4.2 di atas.

      ### 19.2 Oleh Kami

      Kami dapat menangguhkan atau menghentikan akses Anda ke Aplikasi kapan saja, dengan atau tanpa alasan, dengan atau tanpa pemberitahuan, termasuk atas pelanggaran Syarat ini.

      ### 19.3 Akibat Pengakhiran

      Setelah pengakhiran, lisensi Anda untuk menggunakan Aplikasi berakhir. File proyek yang disimpan secara lokal tetap ada di perangkat Anda. File yang disimpan di Google Drive tetap ada di akun Google Drive Anda.

      ## 20. Perubahan Syarat

      Kami dapat memperbarui Syarat ini dari waktu ke waktu. Kami akan memberi tahu pengguna tentang perubahan material dengan memperbarui tanggal "Last Updated" dan, jika memungkinkan, melalui pemberitahuan dalam aplikasi. Penggunaan Anda yang berkelanjutan atas Aplikasi setelah perubahan merupakan penerimaan terhadap Syarat yang diperbarui.

      ## 21. Hukum yang Mengatur dan Penyelesaian Sengketa

      Syarat ini diatur oleh dan ditafsirkan sesuai dengan hukum yang berlaku. Setiap sengketa yang timbul dari Syarat ini atau penggunaan Anda atas Aplikasi akan diselesaikan melalui negosiasi dengan itikad baik. Jika negosiasi gagal, sengketa akan diserahkan ke arbitrase yang mengikat sesuai dengan aturan otoritas arbitrase yang berlaku di yurisdiksi tempat Ingantt Development didirikan.

      ## 22. Ketentuan Umum

      ### 22.1 Keseluruhan Perjanjian

      Syarat ini, bersama dengan [Kebijakan Privasi](privacy_policy.html) kami, merupakan keseluruhan perjanjian antara Anda dan Ingantt Development mengenai Aplikasi.

      ### 22.2 Keterpisahan

      Jika ada ketentuan dalam Syarat ini yang dinyatakan tidak dapat dilaksanakan, ketentuan yang tersisa akan tetap berlaku sepenuhnya.

      ### 22.3 Pengabaian

      Kegagalan kami untuk menegakkan hak atau ketentuan apa pun dalam Syarat ini tidak merupakan pengabaian atas hak atau ketentuan tersebut.

      ### 22.4 Pengalihan

      Anda tidak boleh mengalihkan atau mentransfer hak Anda berdasarkan Syarat ini tanpa persetujuan tertulis sebelumnya dari kami. Kami dapat mengalihkan hak kami tanpa batasan.

      ## 23. Hubungi Kami

      Jika Anda memiliki pertanyaan tentang Syarat ini, silakan hubungi kami di:

      - **Email:** support@ingantt.com
      - **Situs Web:** https://ingantt.com
      - **Dokumentasi:** https://docs.ingantt.com

