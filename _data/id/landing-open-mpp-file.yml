faq:
  title: Membuka file .MPP — pertanyaan saat Anda terjebak
  items:
    - question: Bagaimana cara membuka file .MPP tanpa Microsoft Project?
      answer: Gunakan Ingantt. Aplikasi ini membaca format biner .MPP langsung — tanpa lisensi Microsoft Project, tanpa mesin virtual Windows, tanpa layanan konversi yang mengirim PDF melalui email. Ingantt mengimpor setiap tugas, subtugas, dependensi, penugasan sumber daya, tonggak, dan jalur kritis, dan merender proyek sebagai bagan Gantt lengkap. Uji coba gratis 7 hari mencakup sebagian besar situasi satu kali.
    - question: Bagaimana cara membuka file .MPP di Mac?
      answer: Microsoft Project tidak berjalan di macOS — tidak ada versi Mac. Jadi jawabannya bukan "instal Project di Mac" tetapi "gunakan sesuatu yang membaca .MPP secara asli di Mac". Ingantt memiliki aplikasi macOS asli di Mac App Store yang membuka file .MPP langsung di Mac Apple Silicon dan Intel. Unduh, buka .MPP, dan Anda akan melihat bagan Gantt lengkap dengan tugas, dependensi, dan jalur kritis.
    - question: Bisakah saya menyimpan file .MPP setelah dibuka?
      answer: Ya. Ingantt menyimpan proyek kembali ke format asli .MPP Microsoft Project, ditambah .XML, PDF, dan PNG. Anda dapat membuka .MPP di Mac, iPhone, atau di browser, melakukan pengeditan, menyimpannya kembali sebagai .MPP, dan menyerahkan file kepada rekan yang masih menggunakan Microsoft Project. Jika Anda hanya ingin melihat bagan tanpa mengedit, halaman <a href="/gantt-viewer">Penampil Gantt</a> kami mencakup kasus hanya-baca.
