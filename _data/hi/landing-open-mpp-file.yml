faq:
  title: .MPP फ़ाइलें खोलना — जब आप फंसे हों तो प्रश्न
  items:
    - question: मैं Microsoft Project के बिना .MPP फ़ाइल कैसे खोलूं?
      answer: Ingantt का उपयोग करें। यह .MPP बाइनरी प्रारूप को सीधे पढ़ता है — कोई Microsoft Project लाइसेंस नहीं, कोई Windows वर्चुअल मशीन नहीं, कोई रूपांतरण सेवा नहीं जो ईमेल द्वारा PDF भेजती है। Ingantt हर कार्य, उप-कार्य, निर्भरता, संसाधन असाइनमेंट, मील का पत्थर और महत्वपूर्ण पथ आयात करता है, और प्रोजेक्ट को पूर्ण गैंट चार्ट के रूप में प्रस्तुत करता है। 7-दिन का मुफ्त परीक्षण अधिकांश एक बार की स्थितियों को कवर करता है।
    - question: मैं Mac पर .MPP फ़ाइल कैसे खोलूं?
      answer: Microsoft Project macOS पर नहीं चलता — कोई Mac संस्करण नहीं है। इसलिए उत्तर "Mac पर Project इंस्टॉल करें" नहीं है, बल्कि "Mac पर .MPP को मूल रूप से पढ़ने वाली कोई चीज़ उपयोग करें" है। Ingantt के पास Mac App Store में मूल macOS ऐप है जो Apple Silicon और Intel Macs पर .MPP फ़ाइलों को सीधे खोलता है। डाउनलोड करें, .MPP खोलें, और आप कार्यों, निर्भरताओं और महत्वपूर्ण पथ के साथ पूर्ण गैंट चार्ट देखेंगे।
    - question: क्या मैं .MPP फ़ाइल खोलने के बाद वापस सहेज सकता हूं?
      answer: हां। Ingantt प्रोजेक्ट को Microsoft Project के मूल .MPP प्रारूप में वापस सहेजता है, साथ ही .XML, PDF और PNG में भी। आप Mac, iPhone या ब्राउज़र में .MPP खोल सकते हैं, संपादन कर सकते हैं, इसे .MPP के रूप में वापस सहेज सकते हैं, और फ़ाइल को उस सहकर्मी को सौंप सकते हैं जो अभी भी Microsoft Project का उपयोग करता है। यदि आप केवल चार्ट देखना चाहते हैं बिना संपादन के, तो हमारा <a href="/gantt-viewer">गैंट व्यूअर</a> पेज केवल-पढ़ने-योग्य मामले को कवर करता है।
