faq:
  title: गैंट व्यूअर — अक्सर पूछे जाने वाले प्रश्न
  items:
    - question: मैं Microsoft Project के बिना गैंट चार्ट कैसे देखूं?
      answer: Ingantt में फ़ाइल खोलें। यह Microsoft Project के मूल .MPP प्रारूप और MS Project XML को सीधे आयात करता है, इसलिए MS Project का उपयोग करने वाले सहकर्मी की फ़ाइल पूरी तरह से इंटरैक्टिव गैंट चार्ट के रूप में खुलती है — बिना MS Project लाइसेंस या Windows इंस्टॉलेशन के। कार्य, निर्भरताएं और महत्वपूर्ण पथ पूर्ण रहते हैं।
    - question: क्या कोई मुफ्त गैंट व्यूअर है?
      answer: Ingantt 7 दिन का मुफ्त परीक्षण प्रदान करता है जिसमें क्रेडिट कार्ड की आवश्यकता नहीं है। परीक्षण में सभी प्लेटफ़ॉर्म पर .MPP और MS Project XML फ़ाइलों का पूर्ण दृश्य और संपादन शामिल है। परीक्षण के बाद, भुगतान योजनाएं $5.99 प्रति उपयोगकर्ता प्रति माह से शुरू होती हैं।
    - question: क्या मैं जो गैंट चार्ट देख रहा हूं उसे प्रिंट या शेयर कर सकता हूं?
      answer: हां। Ingantt गैंट चार्ट को PDF या PNG में निर्यात करता है ताकि आप इसे प्रिंट कर सकें, ईमेल में संलग्न कर सकें, या स्लाइड में पेस्ट कर सकें। PDF निर्यात किसी भी ज़ूम स्तर पर समयरेखा लेआउट को सुरक्षित रखता है। यदि आपको बाद में उसी .MPP को कहीं और खोलने की आवश्यकता है, तो हमारी <a href="/open-mpp-file">Microsoft Project के बिना .MPP फ़ाइलें खोलना</a> गाइड देखें।
