faq:
  title: AI गैंट चार्ट — अक्सर पूछे जाने वाले प्रश्न
  items:
    - question: क्या AI सच में गैंट चार्ट बना सकता है?
      answer: हाँ। Ingantt का AI प्राकृतिक भाषा में प्रोजेक्ट विवरण से पूर्ण गैंट चार्ट तैयार करता है, जिसमें कार्य, उप-कार्य, निर्भरताएं, अवधि और मील के पत्थर शामिल हैं। आप लक्ष्य को एक या दो वाक्यों में वर्णित करते हैं, AI लगभग 30 सेकंड में योजना बनाता है, और आप इसे बाद में संपादित करते हैं।
    - question: AI गैंट चार्ट कैसे उत्पन्न करता है?
      answer: Ingantt आपके विवरण को प्रोजेक्ट प्रबंधन पैटर्न पर प्रशिक्षित एक भाषा मॉडल को भेजता है। मॉडल कार्य को चरणों और कार्यों में विभाजित करता है, यथार्थवादी अवधि चुनता है, निर्भरताओं को जोड़ता है, और परिणाम को संपादन योग्य वास्तविक गैंट चार्ट के रूप में प्रस्तुत करता है — स्थिर छवि नहीं।
    - question: क्या AI गैंट चार्ट टेम्पलेट से बेहतर है?
      answer: टेम्पलेट सामान्य होते हैं; AI गैंट चार्ट एक चरण में आपके प्रोजेक्ट के लिए अनुकूलित होता है। टेम्पलेट के साथ आपको स्वयं कार्यों का नाम बदलना, अवधि समायोजित करना और निर्भरताएं जोड़नी पड़ती हैं। AI यह सब प्रॉम्प्ट से करता है, और परिणाम पूरी तरह से संपादन योग्य रहता है।
    - question: क्या ChatGPT गैंट चार्ट बना सकता है?
      answer: ChatGPT टेक्स्ट में प्रोजेक्ट योजना का वर्णन कर सकता है, लेकिन वास्तविक निर्भरताओं, मील के पत्थर और संसाधन आवंटन के साथ इंटरैक्टिव संपादन योग्य गैंट चार्ट नहीं बना सकता। Ingantt का AI बना सकता है — और परिणाम को Microsoft Project के साथ संगत .MPP फ़ाइल के रूप में सहेजता है।
    - question: क्या मैं AI द्वारा बनाए गए को संपादित कर सकता हूँ?
      answer: हाँ। AI द्वारा उत्पन्न प्रत्येक गैंट चार्ट पूरी तरह से संपादन योग्य है। कार्यों को खींचें, अवधि समायोजित करें, निर्भरताएं जोड़ें या हटाएं, संसाधनों को पुनः आवंटित करें, या AI से किसी अनुभाग को संशोधित करने के लिए कहें।
    - question: क्या मुफ्त परीक्षण है?
      answer: हाँ। 7 दिन का मुफ्त परीक्षण असीमित AI प्रोजेक्ट जनरेशन, पूर्ण संपादन, MS Project आयात/निर्यात और Google Drive एकीकरण शामिल करता है। क्रेडिट कार्ड की आवश्यकता नहीं।
