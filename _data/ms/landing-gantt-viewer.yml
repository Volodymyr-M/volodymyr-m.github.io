faq:
  title: Pemapar Gantt — Soalan Lazim
  items:
    - question: Bagaimana cara melihat carta Gantt tanpa Microsoft Project?
      answer: Buka fail dalam Ingantt. Ia mengimport format .MPP asli Microsoft Project dan MS Project XML secara langsung, jadi fail daripada rakan sekerja yang menggunakan MS Project terbuka sebagai carta Gantt yang sepenuhnya interaktif — tanpa lesen MS Project atau pemasangan Windows. Tugasan, kebergantungan dan laluan kritikal kekal utuh.
    - question: Adakah terdapat pemapar Gantt percuma?
      answer: Ingantt menawarkan percubaan percuma 7 hari tanpa kad kredit. Percubaan termasuk pemaparan dan penyuntingan penuh fail .MPP dan MS Project XML pada semua platform. Selepas percubaan, pelan berbayar bermula dari $5.99 setiap pengguna setiap bulan. Kebanyakan keperluan pemaparan sekali sahaja muat dalam percubaan percuma.
    - question: Bolehkah saya mencetak atau berkongsi carta Gantt yang sedang dilihat?
      answer: Ya. Ingantt mengeksport carta Gantt ke PDF atau PNG untuk mencetaknya, melampirkannya ke e-mel atau menampalnya ke slaid. Eksport PDF mengekalkan susun atur garis masa pada mana-mana tahap zum. Jika anda perlu membuka .MPP yang sama di tempat lain kemudian, lihat panduan kami untuk <a href="/open-mpp-file">membuka fail .MPP tanpa Microsoft Project</a>.
