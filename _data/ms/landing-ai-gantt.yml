faq:
  title: Carta Gantt AI — Soalan Lazim
  items:
    - question: Adakah AI benar-benar boleh mencipta carta Gantt?
      answer: Ya. AI Ingantt menjana carta Gantt lengkap daripada penerangan projek dalam bahasa semula jadi, termasuk tugasan, sub-tugasan, kebergantungan, tempoh, dan pencapaian. Anda menerangkan matlamat dalam satu atau dua ayat, AI mencipta rancangan dalam masa kira-kira 30 saat, dan anda menyuntingnya selepas itu.
    - question: Bagaimana AI menjana carta Gantt?
      answer: Ingantt menghantar penerangan anda kepada model bahasa yang dilatih pada corak pengurusan projek. Model memecahkan kerja kepada fasa dan tugasan, memilih tempoh yang realistik, menghubungkan kebergantungan, dan memaparkan hasilnya sebagai carta Gantt sebenar yang boleh disunting — bukan imej statik.
    - question: Adakah carta Gantt AI lebih baik daripada templat?
      answer: Templat bersifat generik; carta Gantt AI disesuaikan untuk projek anda dalam satu langkah. Dengan templat, anda masih perlu menamakan semula tugasan, melaraskan tempoh dan menambah kebergantungan secara manual. AI melakukan semuanya dari prompt, dan hasilnya kekal boleh disunting sepenuhnya.
    - question: Bolehkah ChatGPT mencipta carta Gantt?
      answer: ChatGPT boleh menerangkan rancangan projek dalam teks, tetapi tidak boleh menghasilkan carta Gantt interaktif yang boleh disunting dengan kebergantungan sebenar, pencapaian dan peruntukan sumber. AI Ingantt boleh — dan menyimpan hasilnya sebagai fail .MPP yang serasi dengan Microsoft Project.
    - question: Bolehkah saya menyunting apa yang dicipta AI?
      answer: Ya. Setiap carta Gantt yang dijana AI boleh disunting sepenuhnya. Seret tugasan, laraskan tempoh, tambah atau buang kebergantungan, agihkan semula sumber, atau minta AI menyemak semula bahagian tertentu.
    - question: Adakah terdapat percubaan percuma?
      answer: Ya. Percubaan percuma 7 hari termasuk penjanaan projek AI tanpa had, penyuntingan penuh, import/eksport MS Project dan integrasi Google Drive. Tiada kad kredit diperlukan.
