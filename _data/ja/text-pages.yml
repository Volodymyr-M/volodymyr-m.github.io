    meta_description: Inganttの利用規約
    text_title: 利用規約
    text: |
      **最終更新日: 2026年2月22日**

      本利用規約（以下「本規約」）は、Ingantt Development（以下「当社」）が提供するプロジェクトスケジューリングアプリケーションであるIngantt（以下「本アプリ」「本サービス」）へのアクセスおよび利用を規定するものです。本アプリにアクセスまたは利用することにより、お客様は本規約に拘束されることに同意したものとみなされます。同意いただけない場合は、本アプリを使用しないでください。

      ## 1. サービスの説明

      Inganttは、以下の機能を提供するクロスプラットフォームのプロジェクトスケジューリングアプリケーションです：

      - クリティカルパス法（CPM）アルゴリズムによるプロジェクトスケジューリング
      - 依存関係、制約条件、リソース割り当てを伴うタスク管理
      - ガントチャートの可視化とレンダリング
      - リソース管理とリソースレベリング
      - カレンダーおよび作業スケジュールの管理
      - XML（Microsoft Project互換）、CSV、PDF、Markdownフォーマットでのプロジェクトのインポートおよびエクスポート
      - 当社サーバーを経由したMicrosoft Project（.mpp）ファイルの変換
      - ファイルストレージと共有のためのGoogle Drive連携
      - AIを活用したプロジェクト作成（「AIで作成」）

      本アプリは、Web（web.ingantt.comおよびGoogle Workspace Marketplace経由）、iOS、Android、macOS、Windowsでご利用いただけます。

      ## 2. 利用資格

      本アプリを利用するには、13歳以上である必要があります。13歳以上18歳未満の方は、保護者の同意が必要です。本アプリを利用することにより、お客様はこれらの要件を満たしていることを表明し、保証するものとします。

      ## 3. アカウントと認証

      ### 3.1 Googleサインイン

      Web版の本アプリでは、認証にGoogleサインインが必要です。その他のプラットフォームでは、Google Drive連携などの機能のためにGoogleサインインをご利用いただける場合があります。サインインすることにより、お客様は、アカウントの識別、ライセンス管理、およびサービス提供のために、当社がお客様の基本的なプロフィール情報（氏名およびメールアドレス）にアクセスすることを許可するものとします。

      ### 3.2 アカウントのセキュリティ

      お客様は、ご自身のGoogleアカウントの認証情報のセキュリティを維持する責任を負います。アカウントの不正使用が発生した場合は、直ちにsupport@ingantt.comまでご連絡ください。

      ## 4. 購入と支払い

      ### 4.1 購入モデル

      本アプリは、プラットフォームに応じて異なる購入モデルを採用しています：

      - **Web（web.ingantt.comおよびGoogle Workspace Marketplace）：** 月額プランおよび年額プランによるサブスクリプション方式で運営されます。新規ユーザーには無料トライアルが利用できる場合があります。一部の機能にはアクティブなサブスクリプションが必要です。
      - **iOS（App Store）、Android（Google Play）、macOS（App Store）、Windows（Microsoft Store）：** 買い切り型として提供されます。すべての機能がご購入に含まれます。アプリ内課金やサブスクリプションは不要です。

      ### 4.2 Webサブスクリプションの詳細

      Web版の本アプリについて：

      - **無料トライアル：** 新規ユーザーは、本アプリの機能にアクセスできる無料トライアル期間を受けられる場合があります。トライアル期間は初回使用時に開始されます。
      - **サブスクリプションプラン：** トライアル期間終了後、引き続きご利用いただくにはアクティブなサブスクリプション（月額または年額）が必要です。料金はアプリ内に表示されます。
      - **自動更新：** サブスクリプションは、更新日前にキャンセルされない限り、各請求期間の終了時に自動的に更新されます。
      - **キャンセル：** サブスクリプションは、アプリ内またはsupport@ingantt.comへのご連絡により、いつでもキャンセルできます。キャンセルは現在の請求期間の終了時に有効となります。

      ### 4.3 決済処理

      決済は、該当するプラットフォームを通じて処理されます：

      - **iOSおよびmacOS（App Store）：** Appleが管理し、Appleの規約に準じます
      - **Android（Google Play）：** Google Playが管理し、Googleの規約に準じます
      - **Windows（Microsoft Store）：** Microsoftが管理し、Microsoftの規約に準じます
      - **Web：** 当社のサードパーティ決済処理業者（WayForPay）が管理し、その規約に準じます

      ### 4.4 返金

      返金ポリシーは、ご購入いただいたプラットフォームの規定に従います：

      - **Apple App Store：** Appleの返金ポリシーに準じます
      - **Google Play Store：** Googleの返金ポリシーに準じます
      - **Microsoft Store：** Microsoftの返金ポリシーに準じます
      - **Web：** 購入後7日以内の返金リクエストについては、support@ingantt.comまでお問い合わせください

      ## 5. ユーザーコンテンツとデータ

      ### 5.1 お客様のプロジェクトファイル

      お客様は、本アプリを使用して作成またはインポートしたすべてのプロジェクトファイル、スケジュール、およびデータ（以下「ユーザーコンテンツ」）の完全な所有権を保持します。当社は、お客様のユーザーコンテンツに対していかなる所有権も主張しません。

      ### 5.2 ローカルストレージ

      プロジェクトファイルは、お客様のデバイスにローカルで保存される場合があります。ローカルファイルのバックアップを維持する責任はお客様にあります。デバイスの故障、アプリのアンインストール、その他の当社の管理外の事象によるデータ損失について、当社は責任を負いません。

      ### 5.3 Google Driveストレージ

      Google Drive連携を使用する場合、お客様のファイルはお客様のGoogle Driveアカウント内の「Ingantt Schedules」というフォルダに保存され、GoogleのサービスおよびGoogleのプライバシーポリシーに準じます。本アプリは制限付きの`drive.file`スコープを使用しており、本アプリが作成したファイルまたはお客様が本アプリで明示的に開いたファイルにのみアクセスでき、お客様のGoogle Drive全体にはアクセスしません。当社は、お客様の指示に基づいてプロジェクトファイルの読み取り、書き込み、および管理を行うためにのみ、お客様のGoogle Driveにアクセスします。

      ### 5.4 自動保存

      本アプリは、データ損失に対する保護措置として、内部ストレージに作業を自動的に保存する場合があります。自動保存されたデータは、お客様のデバイスにローカルで保存されます。

      ### 5.5 当社が収集するデータ

      本サービスの提供過程で、当社は以下の情報を収集および処理する場合があります：

      - メールアドレスおよび氏名（認証およびライセンス管理のため）
      - 決済情報（サードパーティの決済プロバイダーが処理します。当社は完全な決済情報を保存しません）
      - アプリの使用状況およびエラーデータ（クラッシュレポートおよび安定性向上のため）
      - 「AIで作成」機能使用時にお客様が送信するAIプロンプト（サードパーティのAIプロバイダーに転送され、当社のサーバーには保持されません）
      - お客様が送信するフィードバック（プロジェクトファイルの添付を含む場合があります）

      データの収集と使用に関する詳細は、当社の[プライバシーポリシー](privacy_policy.html)をご確認ください。

      ## 6. AI機能

      ### 6.1 AIで作成

      本アプリは、AIを活用したプロジェクト作成機能を提供しています。この機能を使用する場合：

      - お客様のテキストプロンプトは当社のサーバーに送信され、Anthropic（Claude）に転送されて処理されます。当社はお客様のプロンプトを当社のサーバーに保持しません。お客様のプロンプトのAnthropicによる処理は、Anthropicの利用規約およびプライバシーポリシーに準じます。
      - 生成されたプロジェクトスケジュールは出発点として提供されるものであり、正確性を確認する必要があります
      - 当社は、AI生成コンテンツの正確性、完全性、または適合性を保証しません
      - AI生成されたスケジュールに依拠する前に、その内容を確認し検証する責任はお客様にあります

      ### 6.2 専門的助言の不提供

      AI生成コンテンツは、専門的なプロジェクト管理の助言を構成するものではありません。AI生成のプロジェクト計画を使用する際は、独自の判断を行ってください。

      ## 7. Microsoft Projectとの互換性

      ### 7.1 ファイル形式のサポート

      本アプリは、Microsoft Projectと互換性のあるXMLファイルのインポートおよびエクスポートをサポートしています。また、当社のサーバーサイド変換サービスを介して、各種プロジェクトファイル形式（.mpp、.mpt、.mpx、.gan、.xerなどを含む）をXMLに変換することも可能です。アップロードされたファイルはメモリ内で処理され、当社のサーバーには保持されません。

      ### 7.2 互換性に関する免責事項

      当社はMicrosoft Projectのファイル形式との互換性に努めていますが、すべてのケースにおいて完全な忠実性を保証するものではありません。Microsoft Projectファイルに含まれる一部の機能、書式、またはデータが完全にサポートされない場合があります。変換されたファイルの正確性をご確認ください。

      ### 7.3 非提携

      Inganttは、Microsoft Corporationと提携、推奨、またはスポンサー関係にはありません。「Microsoft Project」はMicrosoft Corporationの商標です。

      ## 8. 許容される利用

      お客様は、以下の行為を行わないことに同意するものとします：

      - 違法な目的または適用法に違反する方法で本アプリを使用すること
      - 本アプリのリバースエンジニアリング、逆コンパイル、または逆アセンブルを試みること
      - アクセス制限、サブスクリプション確認、またはセキュリティ対策を回避すること
      - 本アプリのサーバーまたはインフラストラクチャを妨害または混乱させること
      - 本アプリの意図されたインターフェースを超えて自動化された手段でアクセスすること
      - 本アプリまたはその一部を再配布、サブライセンス、または再販すること
      - 本アプリを使用してマルウェア、ウイルス、またはその他の有害なコードを送信すること
      - AI機能を悪用して有害、違法、または不適切なコンテンツを生成すること

      ## 9. 知的財産

      ### 9.1 当社の権利

      本アプリ（コード、デザイン、アルゴリズム、ユーザーインターフェース、ドキュメント、およびブランディングを含む）は、Ingantt Developmentの知的財産であり、適用される著作権法、商標法、およびその他の知的財産権法により保護されています。

      ### 9.2 限定ライセンス

      当社は、本規約およびお客様の購入またはサブスクリプションの状況に従い、本アプリを使用するための限定的、非独占的、譲渡不能、取消可能なライセンスをお客様に付与します。

      ## 10. サードパーティサービス

      本アプリは、以下を含む（ただしこれらに限定されない）サードパーティサービスと連携しています：

      - **Google**（サインイン、Drive、OAuth2、Workspace Marketplace、Analytics）
      - **Apple**（App Store）
      - **Google Play**（Google Play Store）
      - **Microsoft**（Microsoft Store）
      - **WayForPay**（Webサブスクリプションの決済処理）
      - **Anthropic（Claude）**（AIを活用したプロジェクト作成）
      - **Sentry**（クライアントサイドのエラーレポート）
      - **Resend**（Webサブスクリプションのトランザクションメール配信）
      - **Microsoft Azure**（サーバーホスティング、データストレージ、およびアプリケーション監視）

      これらのサードパーティサービスの利用は、それぞれの利用規約およびプライバシーポリシーに準じます。当社は、サードパーティサービスの可用性、正確性、または運用方法について責任を負いません。

      ## 11. Cookieとアナリティクス

      Web版の本アプリは、ページビューやセッションデータなどの標準的な利用状況分析を収集するためにGoogle Analytics 4を使用しています。Google Analyticsはお客様のブラウザにCookieを設定する場合があります。ブラウザベースのCookieブロックまたはオプトアウトツールを使用して、このデータ収集を制限することができます。ネイティブモバイルおよびデスクトップ版の本アプリでは、Cookieやアナリティクストラッキングは使用しておりません。

      ## 12. データ保護に関する方針

      - 当社は、お客様のデータを人工知能または機械学習モデルのトレーニングに使用しません。
      - 当社は、お客様の個人情報を第三者に販売しません。
      - お客様のデータは、米国（当社のバックエンドサーバーがMicrosoft Azure、East USリージョンでホスティングされています）およびEU（クライアントサイドのクラッシュレポートがSentryで処理されます）に転送され、処理される場合があります。本アプリを使用することにより、お客様はこれらの転送に同意するものとします。

      詳細については、当社の[プライバシーポリシー](privacy_policy.html)をご確認ください。

      ## 13. メール通信

      Web版の本アプリを使用してアカウントを作成することにより、お客様は、以下を含むアカウントおよびサブスクリプションに関連するトランザクションメールの受信に同意するものとします：

      - ウェルカムメッセージおよびオンボーディングメッセージ
      - トライアル期限切れの通知
      - サブスクリプションの有効化およびキャンセルの確認

      これらはアカウントの運用に必要なサービス関連の通知であり、マーケティングメールではありません。

      ## 14. データの削除

      support@ingantt.comに連絡することで、アカウントおよび関連データの削除を要求できます。有効なリクエストを受領した場合、当社はサーバーからお客様のアカウント情報を削除します。以下の点にご留意ください：

      - Google Driveに保存されたファイルはお客様が管理するものであり、アカウント削除の影響を受けません
      - お客様のデバイスにローカルで保存されたファイルは、アカウント削除の影響を受けません
      - 法律上の要件または正当な事業目的（決済記録など）のために、一部のデータを保持する場合があります

      ## 15. サービスの可用性

      ### 15.1 可用性の非保証

      当社は本アプリの可用性の維持に努めますが、中断のないまたはエラーのないサービスを保証するものではありません。本アプリ（ファイル変換、AIプロジェクト作成などのサーバー依存機能を含む）は、メンテナンス、アップデート、または当社の管理外の事情により一時的に利用できない場合があります。

      ### 15.2 サービスの変更

      当社は、本サービスの一部を、予告の有無にかかわらず、いつでも変更、一時停止、または中止する権利を留保します。重要な変更については、合理的な努力をもってユーザーに通知します。

      ## 16. 保証の免責

      本アプリは、明示または黙示を問わず、商品性、特定目的への適合性、および非侵害の黙示的保証を含むがこれに限定されない、いかなる種類の保証もなく、「現状有姿」および「利用可能な状態」で提供されます。

      当社は以下を保証しません：

      - 本アプリがお客様の特定の要件を満たすこと
      - 本アプリが中断なく、適時に、安全に、またはエラーなく動作すること
      - スケジューリング計算、クリティカルパス分析、またはリソースレベリングの結果が正確または完全であること
      - AI生成コンテンツが正確、適切、またはエラーのないものであること
      - ファイル変換がすべてのデータを完全な忠実性で保持すること

      ## 17. 責任の制限

      適用法で認められる最大限の範囲において、Ingantt Developmentは、以下を含むがこれに限定されない、間接的、偶発的、特別、結果的、または懲罰的な損害について、いかなる場合も責任を負いません：

      - データまたはプロジェクトファイルの喪失
      - 事業の中断または利益の損失
      - スケジューリング計算またはAI生成コンテンツへの依拠から生じる損害
      - サードパーティサービスの障害から生じる損害

      当社の累計責任の総額は、請求に先立つ12か月間にお客様が本アプリに対して支払った金額を超えないものとします。

      ## 18. 補償

      お客様は、以下に起因する請求、損害、損失、責任、および費用（合理的な弁護士費用を含む）について、Ingantt Developmentを補償し、防御し、免責することに同意するものとします：

      - お客様による本アプリの使用
      - お客様による本規約の違反
      - お客様による適用法または第三者の権利の侵害
      - お客様のユーザーコンテンツ

      ## 19. 契約の終了

      ### 19.1 お客様による終了

      お客様はいつでも本アプリの使用を停止できます。Webサブスクリプションをお持ちの場合は、上記第4.2条に記載の手順に従ってキャンセルできます。

      ### 19.2 当社による終了

      当社は、本規約への違反を含め、理由の有無にかかわらず、予告の有無にかかわらず、いつでもお客様の本アプリへのアクセスを一時停止または終了する場合があります。

      ### 19.3 終了の効果

      契約終了時、お客様の本アプリの使用ライセンスは失効します。ローカルに保存されたプロジェクトファイルは、お客様のデバイスに残ります。Google Driveに保存されたファイルは、お客様のGoogle Driveアカウントに残ります。

      ## 20. 規約の変更

      当社は随時本規約を更新する場合があります。重要な変更については、「最終更新日」の日付を更新し、可能な限りアプリ内通知を通じてユーザーにお知らせします。変更後も引き続き本アプリを使用することにより、更新された規約を承諾したものとみなされます。

      ## 21. 準拠法と紛争解決

      本規約は、適用される法律に準拠し、これに従って解釈されるものとします。本規約またはお客様による本アプリの使用に起因する紛争は、誠実な交渉により解決されるものとします。交渉が不調に終わった場合、紛争は、Ingantt Developmentが設立された管轄区域の該当する仲裁機関の規則に従い、拘束力のある仲裁に付託されるものとします。

      ## 22. 一般条項

      ### 22.1 完全合意

      本規約は、当社の[プライバシーポリシー](privacy_policy.html)とともに、本アプリに関するお客様とIngantt Development間の完全な合意を構成します。

      ### 22.2 分離可能性

      本規約のいずれかの条項が執行不能と判断された場合でも、残りの条項は引き続き完全な効力を有するものとします。

      ### 22.3 権利放棄

      当社が本規約のいずれかの権利または条項を行使しなかった場合でも、当該権利または条項の放棄を構成するものではありません。

      ### 22.4 譲渡

      お客様は、当社の事前の書面による同意なく、本規約に基づく権利を譲渡または移転することはできません。当社は、制限なく当社の権利を譲渡することができます。

      ## 23. お問い合わせ

      本規約についてご質問がある場合は、以下までお問い合わせください：

      - **メール：** support@ingantt.com
      - **ウェブサイト：** https://ingantt.com
      - **ドキュメント：** https://docs.ingantt.com

