faq:
  title: ガントビューア — よくある質問
  items:
    - question: ガントビューアとは何ですか？
      answer: ガントビューアは、ガントチャートファイル（通常はMicrosoft Projectの.MPPまたは.XML）を開いて、プロジェクトをインタラクティブなタイムラインとして表示するツールです。本物のビューアでは、スケジュールのスクロール、ズームイン/アウト、フェーズの展開/折りたたみ、タスクにホバーして依存関係・開始日・終了日・リソースを確認できます。Ingamttは、Mac、iOS、iPad、Windows、Android、ブラウザで動作するガントビューアです。
    - question: Microsoft Projectなしでガントチャートを表示できますか？
      answer: はい。Ingamttはプロジェクトのネイティブ.MPP形式とMS Project XMLを直接インポートします。MS Projectのライセンスもインストールも不要です。ブラウザ版を使うか、Mac、iOS、Windows、Android用の無料体験版をインストールしてください。タスク、依存関係、クリティカルパスがすべてそのまま取り込まれます。
    - question: .MPPファイルを無料で表示する方法は？
      answer: Ingamttは、クレジットカード不要の7日間無料体験を提供しています。体験版には、すべてのプラットフォームでの.MPPおよびMS Project XMLファイルの完全な表示と編集が含まれており、「ビューア版」と「エディタ版」の区別はありません。体験後は月額600円程度の有料プランからご利用いただけます。一度きりの表示用途なら無料体験で十分カバーできます。
    - question: 見ているガントチャートを印刷・共有できますか？
      answer: はい。IngamttはガントチャートをPDFまたはPNGにエクスポートして、印刷、メール添付、スライド資料への貼り付けが可能です。PDFエクスポートは任意のズームレベルでタイムラインのレイアウトを保持します。同じ.MPPを後で別の場所で開く必要がある場合は、<a href="/open-mpp-file">Microsoft Projectなしで.MPPファイルを開くガイド</a>をご覧ください。
