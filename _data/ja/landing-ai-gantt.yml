faq:
  title: AIガントチャート — よくある質問
  items:
    - question: AIで本当にガントチャートを作れるのですか？
      answer: はい。IngamttのAIは、自然言語のプロジェクト説明から、タスク、サブタスク、依存関係、期間、マイルストーンを含む完全なガントチャートを生成します。目的を1〜2文で説明すれば、AIが約30秒で計画を作成し、その後自由に編集できます。
    - question: AIはどのようにガントチャートを生成するのですか？
      answer: Ingamttはあなたの説明をプロジェクト管理パターンで訓練された言語モデルに送信します。モデルは作業をフェーズとタスクに分解し、現実的な期間を選択し、依存関係を接続し、結果を編集可能な本物のガントチャートとしてレンダリングします。静的な画像ではありません。
    - question: AIガントチャートはテンプレートより優れていますか？
      answer: テンプレートは汎用的ですが、AIガントチャートは1ステップであなたのプロジェクト専用にカスタマイズされます。テンプレートではタスクの名前変更や期間調整、依存関係の追加を自分で行う必要がありますが、AIはこれらをプロンプトから直接実行し、結果は完全に編集可能です。
    - question: ChatGPTでガントチャートを作れますか？
      answer: ChatGPTはプロジェクト計画をテキストで説明できますが、実際の依存関係、マイルストーン、リソース割り当てを持つインタラクティブで編集可能なガントチャートは作成できません。IngamttのAIはそれができ、結果をMicrosoft Projectと互換性のある.MPPファイルとして保存します。
    - question: AIが作ったものを編集できますか？
      answer: はい。AIが生成したガントチャートはすべて完全に編集可能です。タスクのドラッグ、期間の調整、依存関係の追加・削除、リソースの再割り当て、またはAIにセクションの修正を依頼できます。
    - question: 無料体験はありますか？
      answer: はい。7日間の無料体験には、無制限のAIプロジェクト生成、完全な編集、MS Projectのインポート/エクスポート、Google Drive統合が含まれます。クレジットカードは不要です。
