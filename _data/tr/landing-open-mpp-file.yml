faq:
  title: .MPP dosyalarını açma — takıldığınızda sorular
  items:
    - question: Microsoft Project olmadan bir .MPP dosyasını nasıl açarım?
      answer: Ingantt'ı kullanın. .MPP ikili formatını doğrudan okur — Microsoft Project lisansı, Windows sanal makinesi veya e-posta ile PDF gönderen dönüştürme hizmeti gerekmez. Ingantt her görevi, alt görevi, bağımlılığı, kaynak atamasını, kilometre taşını ve kritik yolu içe aktarır ve projeyi tam bir Gantt çizelgesi olarak gösterir. 7 günlük ücretsiz deneme çoğu tek seferlik durumu karşılar.
    - question: Mac'te bir .MPP dosyasını nasıl açarım?
      answer: Microsoft Project macOS'ta çalışmaz — Mac sürümü yoktur. Yani cevap "Project'i Mac'e kur" değil, "Mac'te .MPP'yi yerel olarak okuyan bir şey kullan"dır. Ingantt'ın Mac App Store'da, Apple Silicon ve Intel Mac'lerde .MPP dosyalarını doğrudan açan yerel bir macOS uygulaması var. İndirin, .MPP'yi açın ve görevler, bağımlılıklar ve kritik yol içeren tam Gantt çizelgesini göreceksiniz.
    - question: .MPP dosyasını açtıktan sonra tekrar kaydedebilir miyim?
      answer: Evet. Ingantt, projeleri Microsoft Project'in yerel .MPP formatına ve ayrıca .XML, PDF ve PNG'ye geri kaydeder. Bir .MPP'yi Mac, iPhone veya tarayıcıda açabilir, düzenleyebilir, .MPP olarak geri kaydedebilir ve dosyayı hâlâ Microsoft Project kullanan bir meslektaşınıza verebilirsiniz. Çizelgeyi yalnızca görüntülemek istiyorsanız ve düzenleme yapmayacaksanız, <a href="/gantt-viewer">Gantt Görüntüleyici</a> sayfamız yalnız okuma durumunu kapsar.
