faq:
  title: Gantt Görüntüleyici — Sıkça sorulanlar
  items:
    - question: Microsoft Project olmadan bir Gantt çizelgesini nasıl görüntülerim?
      answer: Dosyayı Ingantt'ta açın. Microsoft Project'in yerel .MPP formatını ve MS Project XML'i doğrudan içe aktarır, bu yüzden MS Project kullanan bir meslektaşınızdan gelen dosya tam etkileşimli bir Gantt çizelgesi olarak açılır — MS Project lisansı veya Windows kurulumu gerekmez. Görevler, bağımlılıklar ve kritik yol bozulmadan gelir.
    - question: Ücretsiz bir Gantt çizelgesi görüntüleyici var mı?
      answer: Ingantt, kredi kartı gerektirmeyen 7 günlük ücretsiz deneme sunar. Deneme, tüm platformlarda .MPP ve MS Project XML dosyalarının tam görüntüleme ve düzenlemesini içerir. Denemeden sonra ücretli planlar kullanıcı başına aylık 5,99 $'dan başlar. Çoğu tek seferlik görüntüleme ihtiyacı ücretsiz denemeye sığar.
    - question: Görüntülediğim Gantt çizelgesini yazdırabilir veya paylaşabilir miyim?
      answer: Evet. Ingantt, Gantt çizelgesini PDF veya PNG olarak dışa aktarır — yazdırmak, e-postaya eklemek veya sunuma yapıştırmak için. PDF dışa aktarma, herhangi bir yakınlaştırma seviyesinde zaman çizelgesi düzenini korur. Aynı .MPP'yi daha sonra başka bir yerde açmanız gerekirse, <a href="/open-mpp-file">Microsoft Project olmadan .MPP dosyalarını açma</a> kılavuzumuza bakın.
