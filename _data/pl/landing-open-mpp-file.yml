faq:
  title: Otwieranie plików .MPP — częste pytania
  items:
    - question: Jak otworzyć plik .MPP bez Microsoft Project?
      answer: Użyj Ingantt. Odczytuje format binarny .MPP bezpośrednio — bez licencji Microsoft Project, bez wirtualnej maszyny Windows, bez usługi konwersji wysyłającej PDF e-mailem. Ingantt importuje każde zadanie, podzadanie, zależność, przypisanie zasobu, kamień milowy i ścieżkę krytyczną, i renderuje projekt jako kompletny wykres Gantta. 7-dniowy darmowy okres próbny pokrywa większość jednorazowych sytuacji.
    - question: Jak otworzyć plik .MPP na Mac?
      answer: Microsoft Project nie działa na macOS — nie ma wersji Mac. Odpowiedź brzmi "użyj czegoś, co natywnie odczytuje .MPP na Macu". Ingantt ma natywną aplikację macOS w Mac App Store, która otwiera pliki .MPP bezpośrednio na Macach Apple Silicon i Intel. Pobierz, otwórz .MPP i zobaczysz pełny wykres Gantta z zadaniami, zależnościami i ścieżką krytyczną.
    - question: Czy mogę zapisać plik .MPP po otwarciu?
      answer: Tak. Ingantt zapisuje projekty z powrotem w natywnym formacie .MPP Microsoft Project, a także .XML, PDF i PNG. Możesz otworzyć .MPP na Macu, iPhonie lub w przeglądarce, wprowadzić zmiany, zapisać z powrotem jako .MPP i przekazać plik koledze, który nadal używa Microsoft Project. Jeśli chcesz tylko obejrzeć wykres bez edycji, nasza strona <a href="/gantt-viewer">Przeglądarka Gantta</a> obejmuje przypadek tylko do odczytu.
