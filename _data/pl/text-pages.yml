    text_title: Warunki korzystania z usługi
    text: |
      **Ostatnia aktualizacja: 22 lutego 2026**

      Niniejsze Warunki korzystania z usługi („Warunki") regulują dostęp do aplikacji Ingantt („Aplikacja", „Usługa") i korzystanie z niej. Ingantt jest aplikacją do planowania projektów udostępnianą przez Ingantt Development („my", „nas", „nasz"). Uzyskując dostęp do Aplikacji lub korzystając z niej, wyrażasz zgodę na przestrzeganie niniejszych Warunków. Jeśli nie wyrażasz zgody, nie korzystaj z Aplikacji.

      ## 1. Opis Usługi

      Ingantt to wieloplatformowa aplikacja do planowania projektów, która zapewnia:

      - Planowanie projektów z wykorzystaniem algorytmu metody ścieżki krytycznej (CPM)
      - Zarządzanie zadaniami z zależnościami, ograniczeniami i przypisaniami zasobów
      - Wizualizację i renderowanie wykresów Gantta
      - Zarządzanie zasobami i bilansowanie zasobów
      - Zarządzanie kalendarzami i harmonogramami pracy
      - Import i eksport projektów w formatach XML (kompatybilnym z Microsoft Project), CSV, PDF i Markdown
      - Konwersję plików Microsoft Project (.mpp) za pośrednictwem naszego serwera
      - Integrację z Google Drive do przechowywania i udostępniania plików
      - Tworzenie projektów z wykorzystaniem AI („Utwórz z AI")

      Aplikacja jest dostępna na platformach: Web (web.ingantt.com oraz przez Google Workspace Marketplace), iOS, Android, macOS i Windows.

      ## 2. Uprawnienia

      Aby korzystać z Aplikacji, musisz mieć ukończone co najmniej 13 lat. Osoby w wieku od 13 do 18 lat muszą posiadać zgodę rodzica lub opiekuna prawnego. Korzystając z Aplikacji, oświadczasz i gwarantujesz, że spełniasz te wymagania.

      ## 3. Konto i uwierzytelnianie

      ### 3.1 Google Sign-In

      Wersja webowa Aplikacji wymaga logowania przez Google Sign-In w celu uwierzytelnienia. Na innych platformach Google Sign-In może być dostępne dla funkcji takich jak integracja z Google Drive. Logując się, upoważniasz nas do uzyskania dostępu do podstawowych informacji z Twojego profilu (imię i adres e-mail) w celu identyfikacji konta, zarządzania licencjami i świadczenia usług.

      ### 3.2 Bezpieczeństwo konta

      Jesteś odpowiedzialny za utrzymanie bezpieczeństwa danych logowania do swojego konta Google. Zobowiązujesz się niezwłocznie powiadomić nas pod adresem support@ingantt.com o każdym nieautoryzowanym użyciu Twojego konta.

      ## 4. Zakupy i płatności

      ### 4.1 Modele zakupowe

      Aplikacja wykorzystuje różne modele zakupowe w zależności od platformy:

      - **Web (web.ingantt.com i Google Workspace Marketplace):** Aplikacja działa w modelu subskrypcyjnym z planami miesięcznymi i rocznymi. Nowi użytkownicy mogą skorzystać z bezpłatnego okresu próbnego. Dostęp do niektórych funkcji wymaga aktywnej subskrypcji.
      - **iOS (App Store), Android (Google Play), macOS (App Store) i Windows (Microsoft Store):** Aplikacja jest dostępna jako jednorazowy zakup. Wszystkie funkcje są zawarte w cenie zakupu. Nie są wymagane żadne zakupy w aplikacji ani subskrypcje.

      ### 4.2 Szczegóły subskrypcji webowej

      Dla wersji webowej Aplikacji:

      - **Bezpłatny okres próbny:** Nowi użytkownicy mogą otrzymać bezpłatny okres próbny z dostępem do funkcji Aplikacji. Okres próbny rozpoczyna się od pierwszego użycia.
      - **Plany subskrypcyjne:** Po zakończeniu okresu próbnego dalszy dostęp wymaga aktywnej subskrypcji (miesięcznej lub rocznej). Cennik jest wyświetlany w Aplikacji.
      - **Automatyczne odnawianie:** Subskrypcje odnawiają się automatycznie na koniec każdego okresu rozliczeniowego, chyba że zostaną anulowane przed datą odnowienia.
      - **Anulowanie:** Możesz anulować subskrypcję w dowolnym momencie za pośrednictwem Aplikacji lub kontaktując się z nami pod adresem support@ingantt.com. Anulowanie wchodzi w życie z końcem bieżącego okresu rozliczeniowego.

      ### 4.3 Przetwarzanie płatności

      Płatności są przetwarzane przez odpowiednią platformę:

      - **iOS i macOS (App Store):** Zarządzane przez Apple i podlegające warunkom Apple
      - **Android (Google Play):** Zarządzane przez Google Play i podlegające warunkom Google
      - **Windows (Microsoft Store):** Zarządzane przez Microsoft i podlegające warunkom Microsoft
      - **Web:** Zarządzane przez naszego zewnętrznego operatora płatności (WayForPay) i podlegające jego warunkom

      ### 4.4 Zwroty

      Zasady zwrotów są regulowane przez platformę, za pośrednictwem której dokonano zakupu:

      - **Apple App Store:** Podlegają polityce zwrotów Apple
      - **Google Play Store:** Podlegają polityce zwrotów Google
      - **Microsoft Store:** Podlegają polityce zwrotów Microsoft
      - **Web:** Skontaktuj się z nami pod adresem support@ingantt.com w sprawie zwrotów w ciągu 7 dni od zakupu

      ## 5. Treści i dane użytkownika

      ### 5.1 Twoje pliki projektów

      Zachowujesz pełną własność wszystkich plików projektów, harmonogramów i danych tworzonych lub importowanych za pomocą Aplikacji („Treści Użytkownika"). Nie rościmy sobie żadnych praw własności do Twoich Treści Użytkownika.

      ### 5.2 Przechowywanie lokalne

      Pliki projektów mogą być przechowywane lokalnie na Twoim urządzeniu. Jesteś odpowiedzialny za tworzenie kopii zapasowych swoich lokalnych plików. Nie ponosimy odpowiedzialności za utratę danych wynikającą z awarii urządzenia, odinstalowania aplikacji lub innych zdarzeń pozostających poza naszą kontrolą.

      ### 5.3 Przechowywanie w Google Drive

      Jeśli zdecydujesz się korzystać z integracji z Google Drive, Twoje pliki są przechowywane w folderze o nazwie „Ingantt Schedules" na Twoim osobistym koncie Google Drive i podlegają Warunkom korzystania z usługi oraz Polityce prywatności Google. Aplikacja korzysta z ograniczonego zakresu uprawnień `drive.file`, co oznacza, że może uzyskać dostęp wyłącznie do plików, które sama tworzy, lub do plików, które samodzielnie otworzysz w Aplikacji — nie ma dostępu do całego Twojego Google Drive. Uzyskujemy dostęp do Twojego Google Drive wyłącznie w celu odczytywania, zapisywania i zarządzania plikami projektów zgodnie z Twoimi poleceniami.

      ### 5.4 Automatyczny zapis

      Aplikacja może automatycznie zapisywać Twoją pracę w pamięci wewnętrznej jako zabezpieczenie przed utratą danych. Automatycznie zapisane dane są przechowywane lokalnie na Twoim urządzeniu.

      ### 5.5 Dane, które zbieramy

      W ramach świadczenia Usługi możemy zbierać i przetwarzać:

      - Twój adres e-mail i imię (do celów uwierzytelniania i zarządzania licencjami)
      - Informacje o płatnościach (przetwarzane przez zewnętrznych dostawców usług płatniczych; nie przechowujemy pełnych danych płatniczych)
      - Dane o użytkowaniu aplikacji i błędach (do raportowania awarii i poprawy stabilności)
      - Polecenia AI przesyłane podczas korzystania z funkcji „Utwórz z AI" (przekazywane zewnętrznym dostawcom AI, nieprzechowywane na naszych serwerach)
      - Przesyłane przez Ciebie opinie, które mogą zawierać załączone pliki projektów

      Pełne informacje o zbieraniu i wykorzystywaniu danych znajdziesz w naszej [Polityce prywatności](privacy_policy.html).

      ## 6. Funkcje oparte na AI

      ### 6.1 Utwórz z AI

      Aplikacja oferuje tworzenie projektów z wykorzystaniem AI. Korzystając z tej funkcji:

      - Twoje polecenia tekstowe są wysyłane na nasz serwer, który przekazuje je do Anthropic (Claude) w celu przetworzenia. Nie przechowujemy Twoich poleceń na naszych serwerach. Przetwarzanie Twoich poleceń przez Anthropic podlega ich warunkom korzystania z usługi i polityce prywatności.
      - Wygenerowane harmonogramy projektów stanowią punkt wyjścia i powinny być zweryfikowane pod kątem dokładności
      - Nie gwarantujemy dokładności, kompletności ani przydatności treści generowanych przez AI
      - Ponosisz wyłączną odpowiedzialność za weryfikację i walidację harmonogramów wygenerowanych przez AI przed poleganiem na nich

      ### 6.2 Brak doradztwa profesjonalnego

      Treści generowane przez AI nie stanowią profesjonalnego doradztwa w zakresie zarządzania projektami. Podczas korzystania z planów projektów generowanych przez AI powinieneś kierować się własnym osądem.

      ## 7. Kompatybilność z Microsoft Project

      ### 7.1 Obsługa formatów plików

      Aplikacja obsługuje import i eksport plików XML kompatybilnych z Microsoft Project. Aplikacja może również konwertować różne formaty plików projektów (w tym .mpp, .mpt, .mpx, .gan, .xer i inne) do formatu XML za pośrednictwem naszej usługi konwersji po stronie serwera. Przesłane pliki są przetwarzane w pamięci i nie są przechowywane na naszych serwerach.

      ### 7.2 Zastrzeżenie dotyczące kompatybilności

      Chociaż dążymy do kompatybilności z formatami plików Microsoft Project, nie gwarantujemy idealnej wierności we wszystkich przypadkach. Niektóre funkcje, formatowanie lub dane obecne w plikach Microsoft Project mogą nie być w pełni obsługiwane. Należy zweryfikować dokładność skonwertowanych plików.

      ### 7.3 Brak powiązania

      Ingantt nie jest powiązany z Microsoft Corporation, nie jest przez nią wspierany ani sponsorowany. „Microsoft Project" jest znakiem towarowym Microsoft Corporation.

      ## 8. Dopuszczalne użytkowanie

      Zobowiązujesz się nie:

      - Używać Aplikacji w celach niezgodnych z prawem ani w sposób naruszający obowiązujące przepisy
      - Podejmować prób inżynierii wstecznej, dekompilacji lub dezasemblacji Aplikacji
      - Obchodzić jakichkolwiek ograniczeń dostępu, mechanizmów weryfikacji subskrypcji lub zabezpieczeń
      - Zakłócać działania serwerów lub infrastruktury Aplikacji
      - Wykorzystywać zautomatyzowanych środków do uzyskiwania dostępu do Aplikacji poza przewidzianymi interfejsami
      - Redystrybuować, sublicencjonować ani odsprzedawać Aplikacji ani żadnej jej części
      - Używać Aplikacji do przesyłania złośliwego oprogramowania, wirusów lub innego szkodliwego kodu
      - Nadużywać funkcji AI do generowania szkodliwych, nielegalnych lub nieodpowiednich treści

      ## 9. Własność intelektualna

      ### 9.1 Nasze prawa

      Aplikacja, w tym jej kod, projekt, algorytmy, interfejs użytkownika, dokumentacja i identyfikacja wizualna, jest własnością intelektualną Ingantt Development i jest chroniona obowiązującymi przepisami prawa autorskiego, prawa znaków towarowych i innymi przepisami dotyczącymi własności intelektualnej.

      ### 9.2 Ograniczona licencja

      Udzielamy Ci ograniczonej, niewyłącznej, nieprzenoszalnej, odwołalnej licencji na korzystanie z Aplikacji zgodnie z niniejszymi Warunkami oraz statusem Twojego zakupu lub subskrypcji.

      ## 10. Usługi podmiotów trzecich

      Aplikacja integruje się z usługami podmiotów trzecich, w tym między innymi:

      - **Google** (Sign-In, Drive, OAuth2, Workspace Marketplace, Analytics)
      - **Apple** (App Store)
      - **Google Play** (Google Play Store)
      - **Microsoft** (Microsoft Store)
      - **WayForPay** (przetwarzanie płatności za subskrypcje webowe)
      - **Anthropic (Claude)** (tworzenie projektów z wykorzystaniem AI)
      - **Sentry** (raportowanie błędów po stronie klienta)
      - **Resend** (dostarczanie e-maili transakcyjnych dotyczących subskrypcji webowych)
      - **Microsoft Azure** (hosting serwera, przechowywanie danych i monitorowanie aplikacji)

      Korzystanie z tych usług podmiotów trzecich podlega ich odpowiednim warunkom korzystania z usługi i politykom prywatności. Nie ponosimy odpowiedzialności za dostępność, dokładność ani praktyki usług podmiotów trzecich.

      ## 11. Pliki cookie i analityka

      Wersja webowa Aplikacji korzysta z Google Analytics 4 do zbierania standardowych danych analitycznych, takich jak wyświetlenia stron i dane sesji. Google Analytics może ustawiać pliki cookie w Twojej przeglądarce. Możesz korzystać z narzędzi przeglądarki do blokowania plików cookie lub mechanizmów rezygnacji, aby ograniczyć zbieranie tych danych. Natywne wersje mobilne i desktopowe Aplikacji nie korzystają z plików cookie ani śledzenia analitycznego.

      ## 12. Zobowiązania dotyczące ochrony danych

      - Nie wykorzystujemy Twoich danych do trenowania modeli sztucznej inteligencji ani uczenia maszynowego.
      - Nie sprzedajemy Twoich danych osobowych podmiotom trzecim.
      - Twoje dane mogą być przesyłane do Stanów Zjednoczonych (gdzie nasz serwer zaplecza jest hostowany na Microsoft Azure, region East US) oraz do UE (gdzie raporty o awariach po stronie klienta są przetwarzane przez Sentry) i tam przetwarzane. Korzystając z Aplikacji, wyrażasz zgodę na te transfery.

      Pełne informacje znajdziesz w naszej [Polityce prywatności](privacy_policy.html).

      ## 13. Komunikacja e-mailowa

      Korzystając z wersji webowej Aplikacji i zakładając konto, wyrażasz zgodę na otrzymywanie e-maili transakcyjnych związanych z Twoim kontem i subskrypcją, w tym:

      - Wiadomości powitalne i wprowadzające
      - Powiadomienia o wygaśnięciu okresu próbnego
      - Potwierdzenia aktywacji i anulowania subskrypcji

      Są to komunikaty związane z usługą, niezbędne do obsługi Twojego konta, a nie e-maile marketingowe.

      ## 14. Usunięcie danych

      Możesz zażądać usunięcia swojego konta i powiązanych danych, kontaktując się z nami pod adresem support@ingantt.com. Po otrzymaniu prawidłowego żądania usuniemy informacje o Twoim koncie z naszych serwerów. Należy pamiętać, że:

      - Pliki przechowywane na Twoim Google Drive są zarządzane przez Ciebie i nie są objęte usunięciem konta
      - Pliki przechowywane lokalnie na Twoim urządzeniu nie są objęte usunięciem konta
      - Możemy zachować określone dane wymagane przez prawo lub do uzasadnionych celów biznesowych (takich jak dokumentacja płatności)

      ## 15. Dostępność usługi

      ### 15.1 Brak gwarancji dostępności

      Dokładamy starań, aby utrzymać dostępność Aplikacji, ale nie gwarantujemy nieprzerwanego ani wolnego od błędów działania usługi. Aplikacja, w tym funkcje zależne od serwera (konwersja plików, tworzenie projektów z AI), może być tymczasowo niedostępna z powodu konserwacji, aktualizacji lub okoliczności pozostających poza naszą kontrolą.

      ### 15.2 Zmiany w usłudze

      Zastrzegamy sobie prawo do modyfikacji, zawieszenia lub zaprzestania dowolnej części Usługi w dowolnym momencie, z powiadomieniem lub bez. Dołożymy uzasadnionych starań, aby powiadomić użytkowników o istotnych zmianach.

      ## 16. Wyłączenie gwarancji

      APLIKACJA JEST UDOSTĘPNIANA W STANIE „TAK JAK JEST" I „W MIARĘ DOSTĘPNOŚCI", BEZ JAKICHKOLWIEK GWARANCJI, WYRAŹNYCH ANI DOROZUMIANYCH, W TYM MIĘDZY INNYMI DOROZUMIANYCH GWARANCJI PRZYDATNOŚCI HANDLOWEJ, PRZYDATNOŚCI DO OKREŚLONEGO CELU I NIENARUSZALNOŚCI PRAW.

      NIE GWARANTUJEMY, ŻE:

      - APLIKACJA SPEŁNI TWOJE SZCZEGÓLNE WYMAGANIA
      - APLIKACJA BĘDZIE DZIAŁAĆ NIEPRZERWANIE, TERMINOWO, BEZPIECZNIE I BEZ BŁĘDÓW
      - OBLICZENIA HARMONOGRAMU, ANALIZA ŚCIEŻKI KRYTYCZNEJ LUB WYNIKI BILANSOWANIA ZASOBÓW BĘDĄ DOKŁADNE LUB KOMPLETNE
      - TREŚCI GENEROWANE PRZEZ AI BĘDĄ DOKŁADNE, ODPOWIEDNIE LUB WOLNE OD BŁĘDÓW
      - KONWERSJE PLIKÓW ZACHOWAJĄ WSZYSTKIE DANE Z IDEALNĄ WIERNOŚCIĄ

      ## 17. Ograniczenie odpowiedzialności

      W MAKSYMALNYM ZAKRESIE DOZWOLONYM PRZEZ OBOWIĄZUJĄCE PRAWO, W ŻADNYM WYPADKU INGANTT DEVELOPMENT NIE PONOSI ODPOWIEDZIALNOŚCI ZA JAKIEKOLWIEK SZKODY POŚREDNIE, UBOCZNE, SZCZEGÓLNE, WYNIKOWE LUB KARNE, W TYM MIĘDZY INNYMI:

      - UTRATĘ DANYCH LUB PLIKÓW PROJEKTÓW
      - PRZERWĘ W DZIAŁALNOŚCI LUB UTRATĘ ZYSKÓW
      - SZKODY WYNIKAJĄCE Z POLEGANIA NA OBLICZENIACH HARMONOGRAMU LUB TREŚCIACH GENEROWANYCH PRZEZ AI
      - SZKODY WYNIKAJĄCE Z AWARII USŁUG PODMIOTÓW TRZECICH

      NASZA ŁĄCZNA ODPOWIEDZIALNOŚĆ NIE PRZEKROCZY KWOTY ZAPŁACONEJ PRZEZ CIEBIE ZA APLIKACJĘ W OKRESIE DWUNASTU (12) MIESIĘCY POPRZEDZAJĄCYCH ROSZCZENIE.

      ## 18. Zwolnienie z odpowiedzialności

      Zobowiązujesz się zwolnić z odpowiedzialności, bronić i chronić Ingantt Development przed wszelkimi roszczeniami, szkodami, stratami, zobowiązaniami i wydatkami (w tym uzasadnionymi kosztami obsługi prawnej) wynikającymi z:

      - Twojego korzystania z Aplikacji
      - Naruszenia przez Ciebie niniejszych Warunków
      - Naruszenia przez Ciebie obowiązujących przepisów prawa lub praw osób trzecich
      - Twoich Treści Użytkownika

      ## 19. Rozwiązanie umowy

      ### 19.1 Przez Ciebie

      Możesz zaprzestać korzystania z Aplikacji w dowolnym momencie. Jeśli posiadasz subskrypcję webową, możesz ją anulować zgodnie z procedurami opisanymi w punkcie 4.2 powyżej.

      ### 19.2 Przez nas

      Możemy zawiesić lub zakończyć Twój dostęp do Aplikacji w dowolnym momencie, z podaniem przyczyny lub bez, z powiadomieniem lub bez, w tym w przypadku naruszenia niniejszych Warunków.

      ### 19.3 Skutki rozwiązania

      Po rozwiązaniu umowy Twoja licencja na korzystanie z Aplikacji wygasa. Twoje lokalnie przechowywane pliki projektów pozostają na Twoim urządzeniu. Pliki przechowywane na Google Drive pozostają na Twoim koncie Google Drive.

      ## 20. Zmiany Warunków

      Możemy od czasu do czasu aktualizować niniejsze Warunki. Powiadomimy użytkowników o istotnych zmianach, aktualizując datę „Ostatnia aktualizacja" oraz, w miarę możliwości, za pośrednictwem powiadomienia w aplikacji. Dalsze korzystanie z Aplikacji po wprowadzeniu zmian oznacza akceptację zaktualizowanych Warunków.

      ## 21. Prawo właściwe i rozstrzyganie sporów

      Niniejsze Warunki podlegają obowiązującemu prawu i będą interpretowane zgodnie z nim. Wszelkie spory wynikające z niniejszych Warunków lub korzystania z Aplikacji będą rozstrzygane w drodze negocjacji w dobrej wierze. W przypadku niepowodzenia negocjacji spory będą rozstrzygane w drodze wiążącego arbitrażu zgodnie z zasadami właściwego organu arbitrażowego w jurysdykcji, w której Ingantt Development ma swoją siedzibę.

      ## 22. Postanowienia ogólne

      ### 22.1 Całość umowy

      Niniejsze Warunki, wraz z naszą [Polityką prywatności](privacy_policy.html), stanowią całość umowy między Tobą a Ingantt Development dotyczącej Aplikacji.

      ### 22.2 Rozdzielność postanowień

      Jeżeli jakiekolwiek postanowienie niniejszych Warunków zostanie uznane za niewykonalne, pozostałe postanowienia zachowują pełną moc obowiązującą.

      ### 22.3 Zrzeczenie się praw

      Niewykonanie przez nas jakiegokolwiek prawa lub postanowienia niniejszych Warunków nie stanowi zrzeczenia się takiego prawa lub postanowienia.

      ### 22.4 Cesja

      Nie możesz cedować ani przenosić swoich praw wynikających z niniejszych Warunków bez naszej uprzedniej pisemnej zgody. Możemy cedować nasze prawa bez ograniczeń.

      ## 23. Kontakt

      W razie pytań dotyczących niniejszych Warunków prosimy o kontakt:

      - **E-mail:** support@ingantt.com
      - **Strona internetowa:** https://ingantt.com
      - **Dokumentacja:** https://docs.ingantt.com

