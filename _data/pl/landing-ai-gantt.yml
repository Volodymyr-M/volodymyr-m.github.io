faq:
  title: Wykres Gantta AI — Często zadawane pytania
  items:
    - question: Czy AI naprawdę może stworzyć wykres Gantta?
      answer: Tak. AI Ingantt generuje kompletne wykresy Gantta z opisów projektów w języku naturalnym, uwzględniając zadania, podzadania, zależności, czasy trwania i kamienie milowe. Opisujesz cel w jednym-dwóch zdaniach, AI tworzy plan w około 30 sekund, a Ty edytujesz go później.
    - question: Jak AI generuje wykres Gantta?
      answer: Ingantt wysyła Twój opis do modelu językowego wytrenowanego na wzorcach zarządzania projektami. Model rozbija pracę na fazy i zadania, wybiera realistyczne czasy trwania, łączy zależności i renderuje wynik jako prawdziwy edytowalny wykres Gantta — nie statyczny obraz.
    - question: Czy wykres Gantta AI jest lepszy niż szablon?
      answer: Szablony są ogólne; wykres Gantta AI jest dostosowany do Twojego projektu w jednym kroku. Z szablonem musisz samodzielnie zmieniać nazwy zadań, dostosowywać czasy trwania i dodawać zależności. AI wykonuje to wszystko z promptu, a wynik pozostaje w pełni edytowalny.
    - question: Czy ChatGPT może stworzyć wykres Gantta?
      answer: ChatGPT może opisać plan projektu w tekście, ale nie może utworzyć interaktywnego, edytowalnego wykresu Gantta z prawdziwymi zależnościami, kamieniami milowymi i alokacją zasobów. AI Ingantt może — i zapisuje wynik jako plik .MPP zgodny z Microsoft Project.
    - question: Czy mogę edytować to, co tworzy AI?
      answer: Tak. Każdy wykres Gantta wygenerowany przez AI jest w pełni edytowalny. Przeciągaj zadania, dostosowuj czasy trwania, dodawaj lub usuwaj zależności, przypisuj zasoby lub poproś AI o poprawienie sekcji.
    - question: Czy jest darmowy okres próbny?
      answer: Tak. 7-dniowy darmowy okres próbny obejmuje nieograniczone generowanie projektów AI, pełną edycję, import/eksport MS Project i integrację z Google Drive. Bez karty kredytowej.
