faq:
  title: Diagramma di Gantt con IA — Domande frequenti
  items:
    - question: L'IA può davvero creare un diagramma di Gantt?
      answer: Sì. L'IA di Ingantt genera diagrammi di Gantt completi a partire da descrizioni di progetto in linguaggio naturale, incluse attività, sottoattività, dipendenze, durate e milestone. Descrivi l'obiettivo in una o due frasi, l'IA elabora il piano in circa 30 secondi e tu lo modifichi poi.
    - question: Come genera l'IA un diagramma di Gantt?
      answer: Ingantt invia la tua descrizione a un modello linguistico addestrato su schemi di project management. Il modello scompone il lavoro in fasi e attività, sceglie durate realistiche, collega le dipendenze e restituisce il risultato come un vero diagramma di Gantt modificabile — non un'immagine statica.
    - question: Un diagramma di Gantt con IA è meglio di un template?
      answer: I template sono generici; un diagramma di Gantt con IA è personalizzato per il tuo progetto in un solo passaggio. Con un template devi comunque rinominare le attività, adattare le durate e aggiungere le dipendenze. L'IA fa tutto dal prompt e il risultato resta completamente modificabile.
    - question: ChatGPT può creare un diagramma di Gantt?
      answer: ChatGPT può descrivere un piano di progetto in testo, ma non può produrre un diagramma di Gantt interattivo e modificabile con vere dipendenze, milestone e allocazione di risorse. L'IA di Ingantt può — e salva il risultato come file .MPP compatibile con Microsoft Project.
    - question: Posso modificare ciò che crea l'IA?
      answer: Sì. Ogni diagramma di Gantt generato dall'IA è completamente modificabile. Trascina attività, adatta durate, aggiungi o rimuovi dipendenze, riassegna risorse, oppure chiedi all'IA di rivedere una sezione.
    - question: In quali formati esporta il diagramma di Gantt con IA?
      answer: Ingantt salva nel formato nativo di Microsoft Project (.MPP) e in .XML, ed esporta in PDF e PNG. Puoi aprire lo stesso progetto in Microsoft Project o condividere un file .MPP con un collega.
    - question: C'è una prova gratuita?
      answer: Sì. La prova gratuita di 7 giorni include generazione illimitata di progetti con IA, modifica completa, import/export MS Project e integrazione Google Drive. Nessuna carta di credito richiesta.
