faq:
  title: AI 간트 차트 — 자주 묻는 질문
  items:
    - question: AI로 정말 간트 차트를 만들 수 있나요?
      answer: 네. Ingantt의 AI는 자연어 프로젝트 설명에서 작업, 하위 작업, 종속성, 기간, 마일스톤을 포함한 완전한 간트 차트를 생성합니다. 목표를 한두 문장으로 설명하면, AI가 약 30초 안에 계획을 만들고, 이후 자유롭게 편집할 수 있습니다.
    - question: AI는 어떻게 간트 차트를 생성하나요?
      answer: Ingantt는 귀하의 설명을 프로젝트 관리 패턴으로 훈련된 언어 모델에 전송합니다. 모델은 작업을 단계와 작업으로 분해하고, 현실적인 기간을 선택하며, 종속성을 연결하고, 결과를 편집 가능한 실제 간트 차트로 렌더링합니다. 정적 이미지가 아닙니다.
    - question: AI 간트 차트는 템플릿보다 나은가요?
      answer: 템플릿은 일반적이지만, AI 간트 차트는 한 단계로 귀하의 프로젝트에 맞게 맞춤화됩니다. 템플릿을 사용하면 작업 이름 변경, 기간 조정, 종속성 추가를 직접 해야 합니다. AI는 프롬프트에서 모든 것을 처리하고, 결과는 이후에도 완전히 편집 가능합니다.
    - question: ChatGPT로 간트 차트를 만들 수 있나요?
      answer: ChatGPT는 프로젝트 계획을 텍스트로 설명할 수 있지만, 실제 종속성, 마일스톤, 리소스 할당이 있는 대화형 편집 가능한 간트 차트를 만들 수 없습니다. Ingantt의 AI는 가능하며 결과를 Microsoft Project와 호환되는 .MPP 파일로 저장합니다.
    - question: AI가 만든 것을 편집할 수 있나요?
      answer: 네. AI가 생성한 모든 간트 차트는 완전히 편집 가능합니다. 작업을 드래그하고, 기간을 조정하고, 종속성을 추가/삭제하고, 리소스를 재할당하거나, AI에게 섹션 수정을 요청할 수 있습니다.
    - question: 무료 체험이 있나요?
      answer: 네. 7일 무료 체험에는 무제한 AI 프로젝트 생성, 전체 편집, MS Project 가져오기/내보내기, Google Drive 통합이 포함됩니다. 신용카드는 필요하지 않습니다.
