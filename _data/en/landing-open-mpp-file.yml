faq:
  title: Opening .MPP Files — Questions People Ask When They're Stuck
  items:
    - question: How do I open a .MPP file?
      answer: The fastest path is to open the file in Ingantt. A .MPP file is Microsoft Project's native binary format, and by default only Microsoft Project opens it cleanly — but Microsoft Project only runs on Windows, costs several hundred dollars, and is probably not what you want to buy for one file. Ingantt imports .MPP directly, works on Mac, iPhone, iPad, Windows, Android, and the browser, and has a 7-day free trial with no credit card. Open the app, drop in the .MPP, and the full project appears in about 30 seconds.
    - question: How do I open a .MPP file without Microsoft Project?
      answer: Use Ingantt. It reads the .MPP binary format directly — no need for a Microsoft Project license, a Windows virtual machine, or a conversion service that emails you a PDF. Ingantt imports every task, sub-task, dependency, resource assignment, milestone, and the critical path, and renders the project as a full Gantt chart. The 7-day free trial is enough for most one-off file-opening situations, and no credit card is required to start. You can install the native app for your platform or use the browser version.
    - question: How do I open a .MPP file on Mac?
      answer: Microsoft Project doesn't run on macOS — there's no Mac version of Project, period. So the answer isn't "install Project on Mac"; it's "use something that reads .MPP natively on Mac". Ingantt has a native macOS app on the Mac App Store that opens .MPP files directly on Apple silicon and Intel Macs. Download it, open the .MPP, and the full Gantt chart appears with tasks, dependencies, and the critical path intact. If you don't want to install anything, the browser version of Ingantt works the same way in Safari, Chrome, or Firefox.
    - question: Can I open a .MPP file on iPhone or iPad?
      answer: Yes. Ingantt has native iOS apps for iPhone and iPad on the App Store, and both open .MPP and MS Project XML files directly. On iPad you get a wide timeline view with pinch-to-zoom and touch scrolling, which is the closest thing to the desktop Microsoft Project experience on any iOS device. On iPhone the layout adapts to the smaller screen so you can still read tasks, dates, and milestones. This is often the quickest way to open a .MPP a colleague just emailed you while you're away from a computer.
    - question: Can I open a .MPP file online in the browser?
      answer: Yes. Ingantt has a browser version that opens .MPP files in any modern browser — Chrome, Safari, Firefox, or Edge — on Mac, Windows, Linux, Chromebook, or mobile. Sign in with a Google account, upload the .MPP file or pick it from Google Drive, and the full project opens in the browser. Nothing is installed locally and nothing is downloaded. This is the right path if you're on a work machine where you can't install new software, or on a Linux or Chromebook where Microsoft Project was never an option.
    - question: Is there a free way to open .MPP files?
      answer: Ingantt has a 7-day free trial with no credit card required to start, and the trial includes full .MPP import and editing — nothing is locked. For most people who only need to open a .MPP file once or a few times, the free trial covers the situation entirely. After the trial, paid plans start at $5.99 per user per month. If you need to open .MPP files as a regular part of your workflow — for example, if you work with vendors or clients who still use Microsoft Project — the paid plan is less than the cost of a single month of Microsoft 365 Project.
    - question: Will I lose dependencies, resources, or the critical path when I open a .MPP outside Microsoft Project?
      answer: In Ingantt, no — the import is lossless for the fields that matter. Tasks, sub-tasks, finish-to-start dependencies, resource assignments, work and duration, milestones, and the critical-path calculation all come through from the original .MPP file. Ingantt uses the same project structure Microsoft Project uses internally, so a Gantt chart that took an afternoon to build in Project still looks like the same Gantt chart after you open it in Ingantt. Freemium viewers that only show task lists or flatten the project into an image lose the dependency graph, which is usually the most important part of the plan.
    - question: Can I save the .MPP file back after opening it?
      answer: Yes. Ingantt saves projects back to Microsoft Project's native .MPP format, plus .XML for the MS Project XML format and PDF/PNG for read-only sharing. That means you can open an .MPP on a Mac, iPhone, or in the browser, make edits, save back to .MPP, and hand the file to a colleague who still uses Microsoft Project — they'll open it the way they always have. If you only need to look at the chart and don't plan to edit or re-save, our <a href="/gantt-viewer">Gantt viewer page</a> covers the read-only use case specifically.
