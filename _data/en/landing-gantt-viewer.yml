faq:
  title: Gantt Viewer — Questions People Actually Ask
  items:
    - question: What is a Gantt viewer?
      answer: A Gantt viewer is a tool that opens a Gantt chart file — usually a Microsoft Project .MPP or .XML file — and displays the project as an interactive timeline. A real viewer lets you scroll across the schedule, zoom in and out, expand or collapse phases, and hover tasks to see dependencies, start and end dates, and resources. Ingantt is a Gantt viewer that runs on Mac, iOS, iPad, Windows, Android, and in the browser, so you can open the same file on whatever device you have handy.
    - question: How do I view a Gantt chart without Microsoft Project?
      answer: Open the file in Ingantt. It imports Microsoft Project's native .MPP format and MS Project XML directly, so a file you received from a colleague who uses MS Project opens as a full interactive Gantt chart — no MS Project license or Windows install required. You can use the browser version for a one-off, or install the free trial of the Mac, iOS, Windows, or Android app for the same thing offline. Tasks, dependencies, and the critical path all come through intact.
    - question: Can I view a .MPP file on Mac?
      answer: Yes. Ingantt has a native macOS app that opens .MPP and MS Project XML files directly on any recent Mac. You don't need a virtual machine, Parallels, or a Windows install. Download Ingantt from the Mac App Store, open the .MPP file, and you see the full Gantt chart with phases, tasks, dependencies, and the critical path. If you don't want to install anything, the browser version of Ingantt works the same way on macOS Safari, Chrome, and Firefox.
    - question: Can I view a Gantt chart on my iPhone or iPad?
      answer: Yes. Ingantt has native iOS apps for both iPhone and iPad, and they open .MPP and MS Project XML files the same way the Mac version does. On iPad you get a full-width Gantt timeline with pinch-to-zoom and touch scrolling; on iPhone the layout adapts so you can still review tasks and milestones on a smaller screen. This is the fastest way to look at a Gantt that a teammate emailed you while you're away from your desk.
    - question: Is there a free Gantt chart viewer?
      answer: Ingantt offers a 7-day free trial with no credit card required to start. The free trial includes full viewing and editing of .MPP and MS Project XML files on every platform — nothing is locked behind a "viewer edition" vs. "editor edition" split. After the trial, paid plans start at $5.99 per user per month. Most one-off viewing needs fit inside the free trial, and your project files stay in your Google Drive whether you subscribe or not.
    - question: Can I view a Gantt chart without installing anything?
      answer: Yes. Ingantt has a browser version that opens Gantt files on any modern browser — Chrome, Safari, Firefox, or Edge — on Mac, Windows, Linux, Chromebook, or mobile. Sign in with a Google account, point Ingantt at a .MPP file in your Google Drive or upload one, and the Gantt chart loads in the browser with full zoom, scroll, and hover-for-details. Nothing is installed, nothing is downloaded, and you can close the tab when you're done.
    - question: Do I need to know project management to use a Gantt viewer?
      answer: No. Ingantt is designed so a non-PM stakeholder — an executive reviewing a delivery date, a client checking a milestone, a new team member getting oriented — can open a Gantt chart and read it without learning anything new. You scroll the timeline to see when things happen, hover a task to see who's on it, and expand a phase to see the tasks inside. There's no jargon to decode and no setup step beyond opening the file.
    - question: Can I print or share the Gantt chart I'm viewing?
      answer: Yes. Ingantt exports the Gantt chart to PDF or PNG so you can print it, attach it to an email, or paste it into a slide deck. The PDF export preserves the timeline layout at any zoom level, which is useful for handing a read-only version to a stakeholder who doesn't need to touch the original file. If you need to open the same .MPP somewhere else later, see our dedicated guide to <a href="/open-mpp-file">opening .MPP files without Microsoft Project</a>.
