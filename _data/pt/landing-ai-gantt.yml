faq:
  title: Gráfico de Gantt com IA — Perguntas frequentes
  items:
    - question: A IA consegue criar um gráfico de Gantt de verdade?
      answer: Sim. A IA do Ingantt gera gráficos de Gantt completos a partir de descrições de projeto em linguagem natural, incluindo tarefas, subtarefas, dependências, durações e marcos. Você descreve o objetivo em uma ou duas frases, a IA elabora o plano em cerca de 30 segundos, e você edita depois.
    - question: Como a IA gera um gráfico de Gantt?
      answer: O Ingantt envia sua descrição para um modelo de linguagem treinado em padrões de gestão de projetos. O modelo decompõe o trabalho em fases e tarefas, escolhe durações realistas, conecta as dependências e renderiza o resultado como um gráfico de Gantt editável — não uma imagem estática.
    - question: Um gráfico de Gantt com IA é melhor que um modelo?
      answer: Modelos são genéricos; um gráfico de Gantt com IA é personalizado para o seu projeto em uma única etapa. Com um modelo, você ainda precisa renomear tarefas, ajustar durações e adicionar dependências. A IA faz tudo a partir do prompt, e o resultado continua totalmente editável.
    - question: O ChatGPT consegue criar um gráfico de Gantt?
      answer: O ChatGPT consegue descrever um plano de projeto em texto, mas não consegue produzir um gráfico de Gantt interativo e editável com dependências reais, marcos e alocação de recursos. A IA do Ingantt consegue — e salva o resultado como um arquivo .MPP compatível com o Microsoft Project.
    - question: Posso editar o que a IA cria?
      answer: Sim. Todo gráfico de Gantt gerado pela IA é totalmente editável. Arraste tarefas, ajuste durações, adicione ou remova dependências, reatribua recursos, ou peça à IA para revisar uma seção.
    - question: Em quais formatos o gráfico de Gantt com IA exporta?
      answer: O Ingantt salva no formato nativo do Microsoft Project (.MPP) e em .XML, e exporta para PDF e PNG. Você pode abrir o mesmo projeto no Microsoft Project ou compartilhar um arquivo .MPP com um colega.
    - question: Existe um teste gratuito?
      answer: Sim. O teste gratuito de 7 dias inclui geração ilimitada de projetos com IA, edição completa, importação/exportação do MS Project e integração com o Google Drive. Sem cartão de crédito.
