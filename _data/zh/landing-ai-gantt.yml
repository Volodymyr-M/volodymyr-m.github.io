faq:
  title: AI 甘特图 — 常见问题
  items:
    - question: AI 真的可以创建甘特图吗？
      answer: 可以。Ingantt 的 AI 可以从自然语言的项目描述中生成完整的甘特图，包括任务、子任务、依赖关系、持续时间和里程碑。您用一两句话描述目标，AI 约 30 秒内生成完整计划，之后您可以自由编辑。
    - question: AI 如何生成甘特图？
      answer: Ingantt 将您的描述发送到一个在项目管理模式上训练过的语言模型。模型将工作分解为阶段和任务，选择合理的持续时间，连接依赖关系，并将结果呈现为一个真正可编辑的甘特图 — 而不是静态图片。
    - question: AI 甘特图比模板更好吗？
      answer: 模板是通用的；AI 甘特图一步到位地为您的项目量身定制。使用模板时，您仍需手动重命名任务、调整持续时间和添加依赖关系。AI 可以直接从提示完成所有这些，并且结果之后完全可编辑。
    - question: ChatGPT 可以创建甘特图吗？
      answer: ChatGPT 可以用文本描述项目计划，但无法生成具有真实依赖关系、里程碑和资源分配的交互式可编辑甘特图。Ingantt 的 AI 可以 — 并将结果保存为与 Microsoft Project 兼容的 .MPP 文件。
    - question: 我可以编辑 AI 创建的内容吗？
      answer: 可以。每个 AI 生成的甘特图都可以完全编辑。拖动任务、调整持续时间、添加或删除依赖关系、重新分配资源，或请求 AI 修改某个部分。
    - question: 有免费试用吗？
      answer: 有。7 天免费试用包括无限制的 AI 项目生成、完整编辑、MS Project 导入/导出和 Google Drive 集成。无需信用卡。
