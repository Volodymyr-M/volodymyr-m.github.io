terms_of_service:
    title_tag: Ingantt - 服务条款
    meta_keywords: Ingantt, 服务条款
    meta_description: Ingantt 的服务条款
    text_title: 服务条款
    text: |
      **最后更新: 2026年2月22日**

      本服务条款（"条款"）规定了您访问和使用 Ingantt（"应用程序"、"服务"）的条件。Ingantt 是由 Ingantt Development（"我们"）提供的项目调度应用程序。访问或使用本应用程序，即表示您同意受本条款的约束。如果您不同意，请勿使用本应用程序。

      ## 1. 服务描述

      Ingantt 是一款跨平台项目调度应用程序，提供以下功能：

      - 使用关键路径法 (CPM) 算法进行项目调度
      - 包含依赖关系、约束和资源分配的任务管理
      - 甘特图可视化和渲染
      - 资源管理和资源均衡
      - 日历和工作计划管理
      - 以 XML（Microsoft Project 兼容）、CSV、PDF 和 Markdown 格式导入和导出项目
      - 通过我们的服务器转换 Microsoft Project (.mpp) 文件
      - Google Drive 集成，用于文件存储和共享
      - AI 驱动的项目创建（"AI 创建"）

      本应用程序可在 Web（web.ingantt.com 以及通过 Google Workspace Marketplace）、iOS、Android、macOS 和 Windows 上使用。

      ## 2. 使用资格

      您必须年满 13 周岁才能使用本应用程序。如果您的年龄在 13 至 18 岁之间，您必须获得父母或监护人的同意。使用本应用程序即表示您声明并保证您符合上述要求。

      ## 3. 账户和身份验证

      ### 3.1 Google 登录

      本应用程序的 Web 版本需要通过 Google 登录进行身份验证。在其他平台上，Google 登录可用于 Google Drive 集成等功能。登录即表示您授权我们访问您的基本个人资料信息（姓名和电子邮件地址），用于账户识别、许可证管理和服务交付。

      ### 3.2 账户安全

      您有责任维护您的 Google 账户凭据的安全。您同意在发现任何未经授权使用您的账户时，立即通过 support@ingantt.com 通知我们。

      ## 4. 购买和付款

      ### 4.1 购买模式

      本应用程序根据平台使用不同的购买模式：

      - **Web（web.ingantt.com 和 Google Workspace Marketplace）：**本应用程序采用订阅制，提供月度和年度计划。新用户可享受免费试用。部分功能需要有效订阅才能使用。
      - **iOS（App Store）、Android（Google Play）、macOS（App Store）和 Windows（Microsoft Store）：**本应用程序为一次性付费购买。所有功能均包含在您的购买中。无需应用内购买或订阅。

      ### 4.2 Web 订阅详情

      对于本应用程序的 Web 版本：

      - **免费试用：**新用户可获得免费试用期，期间可使用应用程序的各项功能。试用期从首次使用时开始。
      - **订阅计划：**试用期结束后，继续使用需要有效订阅（月度或年度）。定价显示在应用程序内。
      - **自动续订：**订阅会在每个计费周期结束时自动续订，除非在续订日期之前取消。
      - **取消：**您可以随时通过应用程序或联系 support@ingantt.com 取消订阅。取消将在当前计费周期结束时生效。

      ### 4.3 付款处理

      付款通过相应平台处理：

      - **iOS 和 macOS（App Store）：**由 Apple 管理，受 Apple 条款约束
      - **Android（Google Play）：**由 Google Play 管理，受 Google 条款约束
      - **Windows（Microsoft Store）：**由 Microsoft 管理，受 Microsoft 条款约束
      - **Web：**由我们的第三方支付处理商（WayForPay）管理，受其条款约束

      ### 4.4 退款

      退款政策由您购买时所通过的平台管理：

      - **Apple App Store：**受 Apple 退款政策约束
      - **Google Play Store：**受 Google 退款政策约束
      - **Microsoft Store：**受 Microsoft 退款政策约束
      - **Web：**请在购买后 7 天内联系 support@ingantt.com 申请退款

      ## 5. 用户内容和数据

      ### 5.1 您的项目文件

      您保留您使用本应用程序创建或导入的所有项目文件、进度计划和数据（"用户内容"）的完全所有权。我们不对您的用户内容主张任何所有权。

      ### 5.2 本地存储

      项目文件可能存储在您设备的本地。您有责任维护本地文件的备份。我们不对因设备故障、应用程序卸载或其他超出我们控制范围的事件导致的数据丢失负责。

      ### 5.3 Google Drive 存储

      如果您选择使用 Google Drive 集成，您的文件将存储在您个人 Google Drive 账户中名为"Ingantt Schedules"的文件夹中，并受 Google 的服务条款和隐私政策约束。本应用程序使用受限的 `drive.file` 权限范围，这意味着它只能访问它创建的文件或您在应用程序中明确打开的文件——它无法访问您的整个 Google Drive。我们仅按照您的指示访问您的 Google Drive 以读取、写入和管理项目文件。

      ### 5.4 自动保存

      本应用程序可能会自动将您的工作保存到内部存储，以防数据丢失。自动保存的数据存储在您设备的本地。

      ### 5.5 我们收集的数据

      在提供服务的过程中，我们可能会收集和处理以下信息：

      - 您的电子邮件地址和姓名（用于身份验证和许可证管理）
      - 付款信息（由第三方支付服务商处理；我们不存储完整的付款详细信息）
      - 应用程序使用和错误数据（用于崩溃报告和稳定性改进）
      - 您在使用"AI 创建"功能时提交的 AI 提示（转发至第三方 AI 服务商，不在我们的服务器上保留）
      - 您提交的反馈，其中可能包含项目文件附件

      有关数据收集和使用的完整详情，请查阅我们的[隐私政策](privacy_policy.html)。

      ## 6. AI 驱动的功能

      ### 6.1 AI 创建

      本应用程序提供 AI 驱动的项目创建功能。使用此功能时：

      - 您的文本提示将发送到我们的服务器，然后转发至 Anthropic (Claude) 进行处理。我们不会在服务器上保留您的提示。Anthropic 对您的提示的处理受其服务条款和隐私政策约束。
      - 生成的项目进度计划仅作为起点提供，应进行准确性审核
      - 我们不保证 AI 生成内容的准确性、完整性或适用性
      - 您全权负责审核和验证任何 AI 生成的进度计划，然后再依赖它们

      ### 6.2 非专业建议

      AI 生成的内容不构成专业的项目管理建议。在使用 AI 生成的项目计划时，您应当运用独立判断。

      ## 7. Microsoft Project 兼容性

      ### 7.1 文件格式支持

      本应用程序支持导入和导出与 Microsoft Project 兼容的 XML 文件。本应用程序还可以通过我们的服务器端转换服务将各种项目文件格式（包括 .mpp、.mpt、.mpx、.gan、.xer 等）转换为 XML。上传的文件在内存中处理，不会在我们的服务器上保留。

      ### 7.2 兼容性免责声明

      虽然我们努力与 Microsoft Project 文件格式保持兼容，但我们不保证在所有情况下都能完全保真。Microsoft Project 文件中存在的某些功能、格式或数据可能不完全受支持。您应验证转换后文件的准确性。

      ### 7.3 无关联声明

      Ingantt 与 Microsoft Corporation 无关联、未获其认可、也未受其赞助。"Microsoft Project"是 Microsoft Corporation 的商标。

      ## 8. 可接受的使用

      您同意不得：

      - 将本应用程序用于任何非法目的或违反任何适用法律
      - 尝试对本应用程序进行逆向工程、反编译或反汇编
      - 规避任何访问限制、订阅检查或安全措施
      - 干扰或破坏本应用程序的服务器或基础设施
      - 使用自动化手段以超出预定接口的方式访问本应用程序
      - 再分发、转授权或转售本应用程序或其任何部分
      - 使用本应用程序传播恶意软件、病毒或其他有害代码
      - 滥用 AI 功能生成有害、非法或不当的内容

      ## 9. 知识产权

      ### 9.1 我们的权利

      本应用程序，包括其代码、设计、算法、用户界面、文档和品牌标识，均为 Ingantt Development 的知识产权，受适用的版权法、商标法和其他知识产权法保护。

      ### 9.2 有限许可

      我们授予您有限的、非排他性的、不可转让的、可撤销的许可，以根据本条款以及您的购买或订阅状态使用本应用程序。

      ## 10. 第三方服务

      本应用程序集成了包括但不限于以下第三方服务：

      - **Google**（登录、Drive、OAuth2、Workspace Marketplace、Analytics）
      - **Apple**（App Store）
      - **Google Play**（Google Play Store）
      - **Microsoft**（Microsoft Store）
      - **WayForPay**（Web 订阅付款处理）
      - **Anthropic (Claude)**（AI 驱动的项目创建）
      - **Sentry**（客户端错误报告）
      - **Resend**（Web 订阅的事务性邮件投递）
      - **Microsoft Azure**（服务器托管、数据存储和应用监控）

      您对这些第三方服务的使用受其各自的服务条款和隐私政策约束。我们不对第三方服务的可用性、准确性或做法负责。

      ## 11. Cookie 和分析

      本应用程序的 Web 版本使用 Google Analytics 4 收集标准使用分析数据，如页面浏览量和会话数据。Google Analytics 可能会在您的浏览器中设置 Cookie。您可以使用基于浏览器的 Cookie 阻止或退出工具来限制此数据收集。原生移动和桌面版本的应用程序不使用 Cookie 或分析跟踪。

      ## 12. 数据保护承诺

      - 我们不会使用您的数据来训练人工智能或机器学习模型。
      - 我们不会将您的个人信息出售给第三方。
      - 您的数据可能会被传输到美国（我们的后端服务器托管在 Microsoft Azure 美国东部区域）和欧盟（客户端崩溃报告由 Sentry 处理）并在那里进行处理。使用本应用程序即表示您同意此类传输。

      有关完整详情，请查阅我们的[隐私政策](privacy_policy.html)。

      ## 13. 电子邮件通信

      使用本应用程序的 Web 版本并创建账户，即表示您同意接收与您的账户和订阅相关的事务性电子邮件，包括：

      - 欢迎和引导消息
      - 试用到期通知
      - 订阅激活和取消确认

      这些是与服务相关的通信，是账户运营所必需的，而非营销电子邮件。

      ## 14. 数据删除

      您可以通过联系 support@ingantt.com 请求删除您的账户和相关数据。收到有效请求后，我们将从服务器中删除您的账户信息。请注意：

      - 存储在您的 Google Drive 中的文件由您管理，不受账户删除的影响
      - 存储在您设备本地的文件不受账户删除的影响
      - 我们可能会根据法律要求或合法的业务目的（如付款记录）保留某些数据

      ## 15. 服务可用性

      ### 15.1 不保证可用性

      我们努力维护本应用程序的可用性，但不保证服务不中断或无错误。本应用程序，包括依赖服务器的功能（文件转换、AI 项目创建），可能因维护、更新或超出我们控制的情况而暂时不可用。

      ### 15.2 服务修改

      我们保留随时修改、暂停或终止服务的任何部分的权利，无论是否通知。我们将尽合理努力通知用户重大变更。

      ## 16. 免责声明

      本应用程序按"原样"和"可用"状态提供，不附带任何明示或暗示的保证，包括但不限于适销性、特定用途适用性和非侵权的暗示保证。

      我们不保证：

      - 本应用程序将满足您的特定需求
      - 本应用程序将不中断、及时、安全或无错误
      - 调度计算、关键路径分析或资源均衡结果将准确或完整
      - AI 生成的内容将准确、适当或无错误
      - 文件转换将完美保真地保留所有数据

      ## 17. 责任限制

      在适用法律允许的最大范围内，Ingantt Development 在任何情况下均不对任何间接、附带、特殊、后果性或惩罚性损害承担责任，包括但不限于：

      - 数据或项目文件丢失
      - 业务中断或利润损失
      - 因依赖调度计算或 AI 生成内容而导致的损害
      - 因第三方服务故障而导致的损害

      我们的总累计责任不得超过您在索赔之前十二（12）个月内为本应用程序支付的金额。

      ## 18. 赔偿

      您同意对 Ingantt Development 进行赔偿、辩护并使其免受因以下原因产生的任何索赔、损害、损失、责任和费用（包括合理的律师费）：

      - 您对本应用程序的使用
      - 您违反本条款
      - 您违反任何适用法律或第三方权利
      - 您的用户内容

      ## 19. 终止

      ### 19.1 由您终止

      您可以随时停止使用本应用程序。如果您有 Web 订阅，您可以按照上述第 4.2 节中描述的程序取消。

      ### 19.2 由我们终止

      我们可以随时暂停或终止您对本应用程序的访问，无论是否有理由，无论是否通知，包括因您违反本条款。

      ### 19.3 终止的效果

      终止后，您使用本应用程序的许可即告终止。您本地存储的项目文件保留在您的设备上。存储在 Google Drive 中的文件保留在您的 Google Drive 账户中。

      ## 20. 条款变更

      我们可能会不时更新本条款。我们将通过更新"最后更新"日期，以及在可行的情况下通过应用程序内通知来告知用户重大变更。在变更后继续使用本应用程序即表示您接受更新后的条款。

      ## 21. 适用法律和争议

      本条款受适用法律管辖并按其解释。因本条款或您使用本应用程序而引起的任何争议应通过善意协商解决。如果协商失败，争议应根据 Ingantt Development 所在司法管辖区的适用仲裁机构的规则提交具有约束力的仲裁。

      ## 22. 一般条款

      ### 22.1 完整协议

      本条款连同我们的[隐私政策](privacy_policy.html)，构成您与 Ingantt Development 之间关于本应用程序的完整协议。

      ### 22.2 可分割性

      如果本条款的任何条款被认定为不可执行，其余条款将继续完全有效。

      ### 22.3 弃权

      我们未能执行本条款的任何权利或规定，不构成对该权利或规定的放弃。

      ### 22.4 转让

      未经我们事先书面同意，您不得转让或转移您在本条款下的权利。我们可以不受限制地转让我们的权利。

      ## 23. 联系我们

      如果您对本条款有任何疑问，请通过以下方式联系我们：

      - **电子邮件：** support@ingantt.com
      - **网站：** https://ingantt.com
      - **文档：** https://docs.ingantt.com

privacy_policy:
    title_tag: Ingantt - 隐私政策
    meta_keywords: Ingantt, 隐私政策
    meta_description: Ingantt 的隐私政策
    text_title: 隐私政策
    text: |
      **生效日期:** 2026年2月22日
      **最后更新:** 2026年2月22日

      Ingantt Development（"我们"）运营 Ingantt 应用程序（"应用程序"）和位于 https://ingantt.com 的网站（"网站"）。本隐私政策描述了当您在所有受支持的平台（iOS、Android、macOS、Windows 和 Web，包括通过 Google Workspace Marketplace）上使用本应用程序时，我们如何收集、使用和共享信息。

      ## 1. 我们收集的信息

      ### 1.1 您提供的信息

      - **Google 账户信息：**如果您通过 Google 登录，我们会从 Google 获取您的电子邮件地址、显示名称和头像 URL。在原生平台（iOS、Android、macOS、Windows）上，登录是可选的，登录后可启用 Google Drive 文件存储。在 Web 版本上，Google 登录是必需的，用于 Google Drive 文件存储和订阅管理。当您首次使用 Web 版本时，我们的服务器上会创建一条用户记录，包含您的电子邮件地址、姓名、区域设置和注册日期。

      - **订阅和账单信息（仅限 Web）：**通过 Web 购买订阅时，我们会收集您的姓名、电子邮件地址、邮寄地址、电话号码和付款相关详情。此信息将传输至我们的支付处理商 WayForPay 进行交易处理。

      - **反馈：**当您通过应用程序提交反馈时，我们会收集您的消息文本。您可以选择附上当前打开的项目文件，以帮助我们诊断问题。

      - **AI 功能输入：**当您使用"AI 创建"功能时，您提供的文本提示将发送到我们的后端服务器，由 Anthropic (Claude) 处理。

      - **项目文件：**您创建和编辑的项目文件由您控制。文件存储在您设备本地或您的 Google Drive 账户中（名为"Ingantt Schedules"的文件夹）。当您打开非原生格式的文件（如 MPP、GAN、XER 或其他受支持的项目文件格式）时，该文件将传输到我们的服务器进行格式转换。文件仅在内存中处理，不会存储在我们的服务器上。

      ### 1.2 自动收集的信息

      - **应用程序元数据：**对我们后端的每个请求都包含您的应用程序版本、平台名称（iOS、Android、macOS、Windows 或 Web）、系统区域设置，以及（如果已登录）您的电子邮件地址。

      - **崩溃和错误报告：**我们使用 Sentry（托管在欧盟）在生产环境中收集崩溃报告和错误日志。这包括堆栈跟踪、错误消息、应用程序版本和平台信息。我们不会有意通过崩溃报告收集个人数据。

      - **Web 分析（仅限 Web）：**本应用程序的 Web 版本使用 Google Analytics 4 收集标准使用分析数据，包括页面浏览量和会话数据。Google Analytics 可能会在您的浏览器中设置 Cookie。原生移动和桌面版本的应用程序不包含分析跟踪。

      - **用户偏好设置：**本应用程序使用标准平台存储机制在您的设备上存储本地偏好设置（如主题、显示选项、列宽和最近打开的文件列表）。这些偏好设置不会传输到我们的服务器。

      ### 1.3 我们不收集的信息

      - 我们不会使用您的数据来训练人工智能或机器学习模型。
      - 我们不投放广告，也不集成任何广告 SDK。
      - 我们不收集位置数据、通讯录、照片、相机输入或麦克风输入。
      - 我们不使用设备标识符进行跟踪。
      - Android 云备份已对本应用程序明确禁用。

      ## 2. 我们如何使用您的信息

      我们将收集的信息用于以下目的：

      - **提供和运营应用程序：**处理您的请求，通过 Google Drive 启用文件存储和同步，转换文件格式，并提供 AI 驱动的项目创建。
      - **处理订阅（仅限 Web）：**处理 Web 订阅付款，验证订阅状态，并管理您的账户。
      - **发送事务性邮件（仅限 Web）：**向您发送与账户相关的通知，如欢迎消息、试用提醒、订阅确认和取消通知。
      - **提高稳定性和性能：**分析崩溃报告、错误数据和服务器端遥测数据，以识别和修复错误。
      - **了解使用模式（仅限 Web）：**使用汇总的分析数据了解 Web 应用程序的使用方式，并改善用户体验。
      - **回应支持请求：**使用反馈提交来诊断问题并改进应用程序。

      ## 3. 我们如何共享您的信息

      我们不会出售您的个人信息。我们仅在以下情况下共享信息：

      - **服务提供商：**我们使用以下第三方服务提供商来运营应用程序：
        - **Sentry**（Functional Software, Inc.）——客户端崩溃和错误报告，数据在欧盟处理
        - **Microsoft Application Insights**（Microsoft Corporation）——服务器端遥测和错误监控
        - **Google Analytics**（Google LLC）——Web 使用分析（仅限 Web 版本）
        - **Google APIs**（Google LLC）——身份验证和 Google Drive 文件存储
        - **WayForPay** ——订阅付款处理（仅限 Web 版本）
        - **Resend**（Resend, Inc.）——事务性邮件投递（仅限 Web 版本）
        - **Anthropic (Claude)** ——处理 AI 驱动的项目创建提示
        - **Microsoft Azure** ——后端托管和数据存储（美国东部区域）

      - **法律要求：**如果法律要求或根据有效的法律程序，我们可能会披露信息。

      ## 4. 数据存储和安全

      - **服务器端用户数据（仅限 Web）：**您的电子邮件地址、姓名、区域设置、注册日期和订阅状态存储在我们后端服务器的 Azure Table Storage 中。
      - **OAuth 令牌**（Google 访问令牌、刷新令牌和 ID 令牌）存储在平台安全存储中（iOS Keychain、Android Keystore、macOS Keychain 或平台等效机制）。
      - **订阅状态（仅限 Web）**缓存在本地安全存储中，供离线访问使用。
      - 对我们后端的 **API 请求**使用 HMAC-MD5 进行签名以验证完整性。
      - 本应用程序在可用的平台沙箱内运行（macOS App Sandbox、iOS App Sandbox）。
      - 我们所有的网络通信都使用 HTTPS。

      ## 4a. 数据保留

      - **服务器端用户记录（仅限 Web）：**您的用户记录和订阅历史在您的账户存在期间保留。如需请求删除您的数据，请联系 support@ingantt.com。
      - **项目文件：**提交用于格式转换的文件在内存中处理，不会保留。
      - **AI 提示：**为 AI 驱动的项目创建发送的文本提示不会存储在我们的服务器上。
      - **反馈：**反馈消息通过电子邮件转发给我们的支持团队，不会存储在数据库中。
      - **本地数据：**偏好设置、OAuth 令牌和缓存的订阅状态保留在您的设备上，直到您退出登录或卸载应用程序。

      ## 5. 您的选择和权利

      - **原生平台上的登录是可选的：**在 iOS、Android、macOS 和 Windows 上，您无需登录 Google 即可使用本应用程序。登录后可启用 Google Drive 文件存储。在 Web 版本上，Google 登录是应用程序功能、文件存储和订阅管理所必需的。
      - **Google Drive 访问权限：**本应用程序使用受限的 `drive.file` 权限范围，仅允许访问由应用程序创建的文件或您在应用程序中明确打开的文件——而非您的整个 Google Drive。
      - **反馈附件：**提交反馈时附上项目文件是可选的，需要您的明确同意。
      - **Web 分析：**您可以使用基于浏览器的 Cookie 阻止或退出工具来限制 Web 版本上 Google Analytics 的数据收集。
      - **事务性邮件：**在 Web 版本上，您将收到与账户相关的电子邮件（欢迎邮件、试用提醒、订阅通知）。这些是管理您的订阅所必需的服务通信。
      - **数据删除：**您可以随时在应用程序中退出 Google 账户，这将从设备中删除您存储的 OAuth 令牌。如需请求删除您在我们服务器上的用户记录和任何相关数据，请联系 support@ingantt.com。

      ## 6. 儿童隐私

      本应用程序不面向 13 岁以下（或您所在司法管辖区适用年龄以下）的儿童。我们不会有意收集儿童的个人信息。如果您认为某个儿童向我们提供了个人信息，请联系 support@ingantt.com，以便我们采取适当措施。

      ## 7. 国际数据传输

      我们的后端服务器托管在美国东部区域的 Microsoft Azure 上。崩溃报告由位于欧盟的 Sentry 处理。如果您位于美国以外，您的信息可能会被传输到美国或我们的服务提供商运营的其他司法管辖区并在那里进行处理。

      ## 8. 本隐私政策的变更

      我们可能会不时更新本隐私政策。我们将通过更新本政策顶部的"最后更新"日期来通知您任何重大变更。在任何变更后继续使用本应用程序即表示您接受更新后的政策。

      ## 9. 特定平台披露

      ### iOS 和 macOS (Apple)
      - 本应用程序是通过 Apple App Store 分发的付费应用程序。Apple 的隐私惯例适用于购买交易。
      - 本应用程序仅请求您通过系统文件选择器明确授予的文件访问权限。

      ### Android
      - 本应用程序是通过 Google Play 分发的付费应用程序。Google 的隐私惯例适用于购买交易。
      - 本应用程序请求存储读写权限（用于本地文件操作）和互联网权限（用于网络访问）。

      ### Windows
      - 本应用程序是通过 Microsoft Store 分发的付费应用程序。Microsoft 的隐私惯例适用于购买交易。

      ### Web
      - Web 版本使用订阅模式。订阅付款通过 WayForPay 处理。
      - 本应用程序还可通过 Google Workspace Marketplace 获取。
      - Google Analytics Cookie 设置在 web.ingantt.com 域上。
      - Google OAuth 身份验证使用临时的 localStorage 条目进行登录回调，该条目在使用后立即清除。

