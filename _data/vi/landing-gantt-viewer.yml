faq:
  title: Trình xem Gantt — Câu hỏi thường gặp
  items:
    - question: Làm thế nào để xem biểu đồ Gantt mà không có Microsoft Project?
      answer: Mở tệp trong Ingantt. Nó trực tiếp nhập định dạng .MPP gốc của Microsoft Project và MS Project XML, vì vậy tệp từ đồng nghiệp sử dụng MS Project sẽ mở dưới dạng biểu đồ Gantt hoàn toàn tương tác — không cần giấy phép MS Project hay cài đặt Windows. Nhiệm vụ, phụ thuộc và đường găng đều được giữ nguyên.
    - question: Có trình xem Gantt miễn phí không?
      answer: Ingantt cung cấp bản dùng thử miễn phí 7 ngày không cần thẻ tín dụng. Bản dùng thử bao gồm xem và chỉnh sửa đầy đủ các tệp .MPP và MS Project XML trên mọi nền tảng. Sau bản dùng thử, các gói trả phí bắt đầu từ 5,99 $ cho mỗi người dùng mỗi tháng. Hầu hết nhu cầu xem một lần đều nằm trong bản dùng thử miễn phí.
    - question: Tôi có thể in hoặc chia sẻ biểu đồ Gantt đang xem không?
      answer: Có. Ingantt xuất biểu đồ Gantt sang PDF hoặc PNG để in, đính kèm email hoặc dán vào slide. Xuất PDF giữ nguyên bố cục dòng thời gian ở bất kỳ mức phóng nào. Nếu bạn cần mở cùng một .MPP ở nơi khác sau này, hãy xem hướng dẫn <a href="/open-mpp-file">mở tệp .MPP không cần Microsoft Project</a> của chúng tôi.
