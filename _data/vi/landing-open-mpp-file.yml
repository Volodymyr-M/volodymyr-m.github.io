faq:
  title: Mở tệp .MPP — câu hỏi khi bạn mắc kẹt
  items:
    - question: Làm thế nào để mở tệp .MPP mà không có Microsoft Project?
      answer: Sử dụng Ingantt. Nó đọc định dạng nhị phân .MPP trực tiếp — không cần giấy phép Microsoft Project, không cần máy ảo Windows, không cần dịch vụ chuyển đổi gửi PDF qua email. Ingantt nhập mọi nhiệm vụ, nhiệm vụ con, phụ thuộc, phân bổ tài nguyên, cột mốc và đường găng, và hiển thị dự án dưới dạng biểu đồ Gantt hoàn chỉnh. Bản dùng thử miễn phí 7 ngày đủ cho hầu hết các tình huống một lần.
    - question: Làm thế nào để mở tệp .MPP trên Mac?
      answer: Microsoft Project không chạy trên macOS — không có phiên bản Mac. Vì vậy, câu trả lời không phải là "cài Project trên Mac" mà là "dùng thứ gì đó đọc .MPP nguyên bản trên Mac". Ingantt có ứng dụng macOS nguyên bản trên Mac App Store mở các tệp .MPP trực tiếp trên Mac Apple Silicon và Intel. Tải xuống, mở .MPP, và bạn sẽ thấy biểu đồ Gantt đầy đủ với nhiệm vụ, phụ thuộc và đường găng.
    - question: Tôi có thể lưu tệp .MPP sau khi mở không?
      answer: Có. Ingantt lưu các dự án về định dạng .MPP gốc của Microsoft Project, cộng với .XML, PDF và PNG. Bạn có thể mở một .MPP trên Mac, iPhone hoặc trong trình duyệt, thực hiện chỉnh sửa, lưu lại dưới dạng .MPP và chuyển tệp cho đồng nghiệp vẫn đang dùng Microsoft Project. Nếu bạn chỉ muốn xem biểu đồ mà không chỉnh sửa, trang <a href="/gantt-viewer">Trình xem Gantt</a> của chúng tôi bao gồm trường hợp chỉ đọc.
