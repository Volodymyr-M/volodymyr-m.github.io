faq:
  title: KI Gantt-Diagramm — Häufig gestellte Fragen
  items:
    - question: Kann KI wirklich ein Gantt-Diagramm erstellen?
      answer: Ja. Die KI von Ingantt generiert vollständige Gantt-Diagramme aus einfachen Projektbeschreibungen, inklusive Aufgaben, Teilaufgaben, Abhängigkeiten, Dauer und Meilensteinen. Sie beschreiben Ihr Ziel in ein bis zwei Sätzen, die KI erstellt den Plan in etwa 30 Sekunden, und Sie bearbeiten ihn anschließend nach Bedarf.
    - question: Wie erstellt die KI ein Gantt-Diagramm?
      answer: Ingantt sendet Ihre Beschreibung an ein Sprachmodell, das auf Projektmanagement-Muster trainiert wurde. Das Modell gliedert die Arbeit in Phasen und Aufgaben, wählt realistische Dauern, verknüpft Abhängigkeiten und rendert das Ergebnis als echtes bearbeitbares Gantt-Diagramm — kein statisches Bild.
    - question: Ist ein KI-Gantt-Diagramm besser als eine Vorlage?
      answer: Vorlagen sind generisch; ein KI-generiertes Gantt-Diagramm ist in einem Schritt auf Ihr konkretes Projekt zugeschnitten. Bei Vorlagen müssen Sie selbst Aufgaben umbenennen, Dauern anpassen und Abhängigkeiten hinzufügen. Die KI erledigt das direkt aus dem Prompt, und das Ergebnis ist danach voll editierbar.
    - question: Kann ChatGPT ein Gantt-Diagramm erstellen?
      answer: ChatGPT kann einen Projektplan als Text beschreiben, aber kein interaktives, bearbeitbares Gantt-Diagramm mit echten Abhängigkeiten, Meilensteinen und Ressourcenplanung erzeugen. Ingantts KI schon — und speichert das Ergebnis als .MPP-Datei, die Microsoft Project oder andere Gantt-Tools öffnen können.
    - question: Kann ich das KI-Ergebnis bearbeiten?
      answer: Ja. Jedes KI-generierte Gantt-Diagramm ist vollständig bearbeitbar. Aufgaben verschieben, Dauern anpassen, Abhängigkeiten ändern, Ressourcen neu zuweisen oder einen Bereich per KI neu generieren — alles möglich.
    - question: In welche Formate exportiert das KI-Gantt-Diagramm?
      answer: Ingantt speichert im nativen Microsoft-Project-Format (.MPP) sowie als .XML und exportiert zu PDF und PNG. Sie können dasselbe Projekt in Microsoft Project öffnen oder eine .MPP-Datei mit Kolleg:innen austauschen.
    - question: Gibt es eine kostenlose Testversion?
      answer: Ja. Die 7-tägige kostenlose Testversion umfasst unbegrenzte KI-Projektgenerierung, volle Bearbeitung, MS-Project-Import/Export und Google-Drive-Integration. Keine Kreditkarte erforderlich.
