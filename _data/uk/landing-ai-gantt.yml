faq:
  title: Діаграма Ганта зі ШІ — часті запитання
  items:
    - question: Чи справді ШІ може створити діаграму Ганта?
      answer: Так. ШІ Ingantt генерує повні діаграми Ганта з описів проектів природною мовою, включно із завданнями, підзавданнями, залежностями, тривалостями та етапами. Ви описуєте ціль у одному-двох реченнях, ШІ формує план приблизно за 30 секунд, і ви редагуєте його далі.
    - question: Як ШІ генерує діаграму Ганта?
      answer: Ingantt надсилає ваш опис до мовної моделі, навченої на шаблонах управління проектами. Модель розбиває роботу на етапи й завдання, обирає реалістичні тривалості, з'єднує залежності та повертає результат як справжню редаговану діаграму Ганта — не статичне зображення.
    - question: Діаграма Ганта зі ШІ краща за шаблон?
      answer: Шаблони є універсальними; діаграма Ганта зі ШІ адаптована до вашого проекту за один крок. З шаблоном ви все одно мусите перейменовувати завдання, підлаштовувати тривалості та додавати залежності вручну. ШІ робить усе це прямо з промпту, а результат залишається повністю редагованим.
    - question: Чи може ChatGPT створити діаграму Ганта?
      answer: ChatGPT може описати план проекту текстом, але не може створити інтерактивну редаговану діаграму Ганта з реальними залежностями, етапами та розподілом ресурсів. ШІ Ingantt може — і зберігає результат як файл .MPP, сумісний із Microsoft Project.
    - question: Чи можу я редагувати те, що створює ШІ?
      answer: Так. Кожну діаграму Ганта, згенеровану ШІ, можна повністю редагувати. Перетягуйте завдання, підлаштовуйте тривалості, додавайте або видаляйте залежності, перепризначайте ресурси або просіть ШІ переробити певну частину.
    - question: Чи є безкоштовна пробна версія?
      answer: Так. 7-денна безкоштовна пробна версія включає необмежену генерацію проектів зі ШІ, повне редагування, імпорт/експорт MS Project та інтеграцію з Google Drive. Кредитна картка не потрібна.
