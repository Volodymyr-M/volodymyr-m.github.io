    text_title: Умови використання
    text: |
      **Last Updated: February 22, 2026**

      Ці Умови використання ("Умови") регулюють ваш доступ до та використання Ingantt ("Додаток", "Сервіс") — додатку для планування проектів, що надається Ingantt Development ("ми", "нас", "наш"). Отримуючи доступ до Додатку або використовуючи його, ви погоджуєтеся дотримуватися цих Умов. Якщо ви не згодні з ними, не використовуйте Додаток.

      ## 1. Опис Сервісу

      Ingantt — це кросплатформний додаток для планування проектів, що надає:

      - Планування проектів за допомогою алгоритму критичного шляху (CPM)
      - Управління завданнями із залежностями, обмеженнями та призначенням ресурсів
      - Візуалізацію та відображення діаграм Ганта
      - Управління ресурсами та вирівнювання ресурсів
      - Управління календарями та робочими графіками
      - Імпорт та експорт проектів у форматах XML (сумісний з Microsoft Project), CSV, PDF та Markdown
      - Конвертацію файлів Microsoft Project (.mpp) через наш сервер
      - Інтеграцію з Google Drive для зберігання та обміну файлами
      - Створення проектів за допомогою ШІ ("Create with AI")

      Додаток доступний на Web (web.ingantt.com та через Google Workspace Marketplace), iOS, Android, macOS та Windows.

      ## 2. Право на використання

      Для використання Додатку вам має бути щонайменше 13 років. Якщо вам від 13 до 18 років, ви повинні мати згоду батьків або опікуна. Використовуючи Додаток, ви підтверджуєте та гарантуєте, що відповідаєте цим вимогам.

      ## 3. Обліковий запис та автентифікація

      ### 3.1 Google Sign-In

      Веб-версія Додатку вимагає Google Sign-In для автентифікації. На інших платформах Google Sign-In може бути доступний для таких функцій, як інтеграція з Google Drive. Входячи в систему, ви дозволяєте нам отримувати доступ до вашої базової інформації профілю (імʼя та електронна адреса) для ідентифікації облікового запису, управління ліцензіями та надання послуг.

      ### 3.2 Безпека облікового запису

      Ви несете відповідальність за безпеку облікових даних вашого облікового запису Google. Ви зобовʼязуєтесь негайно повідомити нас за адресою support@ingantt.com про будь-яке несанкціоноване використання вашого облікового запису.

      ## 4. Покупки та оплата

      ### 4.1 Моделі придбання

      Додаток використовує різні моделі придбання залежно від платформи:

      - **Web (web.ingantt.com та Google Workspace Marketplace):** Додаток працює на основі підписки з місячними та річними планами. Для нових користувачів може бути доступний безкоштовний пробний період. Для доступу до певних функцій потрібна активна підписка.
      - **iOS (App Store), Android (Google Play), macOS (App Store) та Windows (Microsoft Store):** Додаток доступний як одноразова платна покупка. Усі функції включені в покупку. Внутрішні покупки або підписки не потрібні.

      ### 4.2 Деталі веб-підписки

      Для веб-версії Додатку:

      - **Безкоштовний пробний період:** Нові користувачі можуть отримати безкоштовний пробний період з доступом до функцій Додатку. Пробний період починається з першого використання.
      - **Плани підписки:** Після закінчення пробного періоду для продовження доступу потрібна активна підписка (місячна або річна). Ціни відображаються в Додатку.
      - **Автоматичне продовження:** Підписки автоматично продовжуються наприкінці кожного розрахункового періоду, якщо не скасовані до дати продовження.
      - **Скасування:** Ви можете скасувати підписку в будь-який час через Додаток або звернувшись до support@ingantt.com. Скасування набирає чинності наприкінці поточного розрахункового періоду.

      ### 4.3 Обробка платежів

      Платежі обробляються через відповідну платформу:

      - **iOS та macOS (App Store):** Управляється через Apple і підпорядковується умовам Apple
      - **Android (Google Play):** Управляється через Google Play і підпорядковується умовам Google
      - **Windows (Microsoft Store):** Управляється через Microsoft і підпорядковується умовам Microsoft
      - **Web:** Управляється через нашого стороннього платіжного оператора (WayForPay) і підпорядковується його умовам

      ### 4.4 Повернення коштів

      Політика повернення коштів визначається платформою, через яку здійснено покупку:

      - **Apple App Store:** Відповідно до політики повернення коштів Apple
      - **Google Play Store:** Відповідно до політики повернення коштів Google
      - **Microsoft Store:** Відповідно до політики повернення коштів Microsoft
      - **Web:** Звертайтесь на support@ingantt.com із запитами на повернення коштів протягом 7 днів після покупки

      ## 5. Користувацький контент та дані

      ### 5.1 Ваші файли проектів

      Ви зберігаєте повне право власності на всі файли проектів, графіки та дані, які ви створюєте або імпортуєте за допомогою Додатку ("Користувацький контент"). Ми не претендуємо на жодні права власності щодо вашого Користувацького контенту.

      ### 5.2 Локальне зберігання

      Файли проектів можуть зберігатися локально на вашому пристрої. Ви несете відповідальність за створення резервних копій ваших локальних файлів. Ми не несемо відповідальності за втрату даних внаслідок збою пристрою, видалення додатку або інших подій, що знаходяться поза нашим контролем.

      ### 5.3 Зберігання в Google Drive

      Якщо ви обираєте використання інтеграції з Google Drive, ваші файли зберігаються у папці "Ingantt Schedules" у вашому особистому обліковому записі Google Drive і підпорядковуються Умовам використання та Політиці конфіденційності Google. Додаток використовує обмежену область доступу `drive.file`, що означає, що він може отримувати доступ лише до файлів, які він створює, або до файлів, які ви явно відкриваєте в Додатку — він не має доступу до всього вашого Google Drive. Ми отримуємо доступ до вашого Google Drive лише для читання, запису та управління файлами проектів за вашим вказівками.

      ### 5.4 Автозбереження

      Додаток може автоматично зберігати вашу роботу у внутрішнє сховище як захист від втрати даних. Автоматично збережені дані зберігаються локально на вашому пристрої.

      ### 5.5 Дані, які ми збираємо

      У процесі надання Сервісу ми можемо збирати та обробляти:

      - Вашу електронну адресу та імʼя (для автентифікації та управління ліцензіями)
      - Платіжну інформацію (обробляється сторонніми платіжними провайдерами; ми не зберігаємо повні платіжні дані)
      - Дані про використання додатку та помилки (для звітування про збої та підвищення стабільності)
      - Промпти ШІ, які ви надсилаєте при використанні функції "Create with AI" (передаються стороннім провайдерам ШІ, не зберігаються на наших серверах)
      - Відгуки, які ви надсилаєте, включаючи можливі вкладення файлів проектів

      Для повної інформації про збір та використання даних, будь ласка, ознайомтеся з нашою [Політикою конфіденційності](privacy_policy.html).

      ## 6. Функції на основі ШІ

      ### 6.1 Create with AI

      Додаток пропонує створення проектів за допомогою ШІ. При використанні цієї функції:

      - Ваші текстові промпти надсилаються на наш сервер, який передає їх до Anthropic (Claude) для обробки. Ми не зберігаємо ваші промпти на наших серверах. Обробка ваших промптів компанією Anthropic підпорядковується їх умовам використання та політиці конфіденційності.
      - Згенеровані графіки проектів надаються як відправні точки і повинні бути перевірені на точність
      - Ми не гарантуємо точність, повноту або придатність контенту, згенерованого ШІ
      - Ви несете повну відповідальність за перевірку та валідацію будь-яких згенерованих ШІ графіків перед тим, як покладатися на них

      ### 6.2 Відсутність професійних порад

      Контент, згенерований ШІ, не є професійною порадою з управління проектами. Вам слід використовувати незалежне судження при роботі з планами проектів, створеними ШІ.

      ## 7. Сумісність з Microsoft Project

      ### 7.1 Підтримка форматів файлів

      Додаток підтримує імпорт та експорт XML-файлів, сумісних з Microsoft Project. Додаток також може конвертувати різні формати файлів проектів (включаючи .mpp, .mpt, .mpx, .gan, .xer та інші) у XML через нашу серверну службу конвертації. Завантажені файли обробляються в памʼяті і не зберігаються на наших серверах.

      ### 7.2 Застереження щодо сумісності

      Хоча ми прагнемо до сумісності з форматами файлів Microsoft Project, ми не гарантуємо ідеальну точність у всіх випадках. Деякі функції, форматування або дані, присутні у файлах Microsoft Project, можуть не підтримуватися повністю. Вам слід перевіряти конвертовані файли на точність.

      ### 7.3 Відсутність афіліації

      Ingantt не є афілійованим, схваленим або спонсорованим компанією Microsoft Corporation. "Microsoft Project" є торговою маркою Microsoft Corporation.

      ## 8. Допустиме використання

      Ви зобовʼязуєтесь не:

      - Використовувати Додаток у незаконних цілях або з порушенням будь-яких чинних законів
      - Намагатися здійснити зворотну розробку, декомпіляцію або дизасемблювання Додатку
      - Обходити будь-які обмеження доступу, перевірки підписок або заходи безпеки
      - Перешкоджати роботі серверів або інфраструктури Додатку
      - Використовувати автоматизовані засоби для доступу до Додатку поза його передбаченими інтерфейсами
      - Розповсюджувати, субліцензувати або перепродавати Додаток або будь-яку його частину
      - Використовувати Додаток для передачі шкідливого програмного забезпечення, вірусів або іншого шкідливого коду
      - Зловживати функцією ШІ для створення шкідливого, незаконного або неприйнятного контенту

      ## 9. Інтелектуальна власність

      ### 9.1 Наші права

      Додаток, включаючи його код, дизайн, алгоритми, інтерфейс користувача, документацію та брендинг, є інтелектуальною власністю Ingantt Development і захищений відповідними законами про авторське право, торгові марки та іншу інтелектуальну власність.

      ### 9.2 Обмежена ліцензія

      Ми надаємо вам обмежену, невиключну, без права передачі, відкличну ліцензію на використання Додатку відповідно до цих Умов та вашого статусу покупки або підписки.

      ## 10. Сторонні сервіси

      Додаток інтегрується зі сторонніми сервісами, включаючи, але не обмежуючись:

      - **Google** (Sign-In, Drive, OAuth2, Workspace Marketplace, Analytics)
      - **Apple** (App Store)
      - **Google Play** (Google Play Store)
      - **Microsoft** (Microsoft Store)
      - **WayForPay** (обробка платежів для веб-підписок)
      - **Anthropic (Claude)** (створення проектів за допомогою ШІ)
      - **Sentry** (клієнтська звітність про помилки)
      - **Resend** (доставка транзакційних електронних листів для веб-підписок)
      - **Microsoft Azure** (хостинг серверів, зберігання даних та моніторинг додатків)

      Використання вами цих сторонніх сервісів підпорядковується їх відповідним умовам використання та політикам конфіденційності. Ми не несемо відповідальності за доступність, точність або практики сторонніх сервісів.

      ## 11. Файли cookie та аналітика

      Веб-версія Додатку використовує Google Analytics 4 для збору стандартної аналітики використання, такої як перегляди сторінок та дані сеансів. Google Analytics може встановлювати файли cookie у вашому браузері. Ви можете використовувати засоби блокування файлів cookie у браузері або інструменти відмови для обмеження збору даних. Нативні мобільні та десктопні версії Додатку не використовують файли cookie та аналітичне відстеження.

      ## 12. Зобовʼязання щодо захисту даних

      - Ми не використовуємо ваші дані для навчання моделей штучного інтелекту або машинного навчання.
      - Ми не продаємо вашу особисту інформацію третім сторонам.
      - Ваші дані можуть бути передані та оброблені в Сполучених Штатах (де наш серверний backend розміщений на Microsoft Azure, регіон East US) та в ЄС (де клієнтські звіти про збої обробляються Sentry). Використовуючи Додаток, ви даєте згоду на таку передачу.

      Для повної інформації, будь ласка, ознайомтеся з нашою [Політикою конфіденційності](privacy_policy.html).

      ## 13. Електронні повідомлення

      Використовуючи веб-версію Додатку та створюючи обліковий запис, ви погоджуєтеся отримувати транзакційні електронні листи, повʼязані з вашим обліковим записом та підпискою, включаючи:

      - Привітальні та ознайомлювальні повідомлення
      - Сповіщення про закінчення пробного періоду
      - Підтвердження активації та скасування підписки

      Це повідомлення, повʼязані з обслуговуванням, необхідні для функціонування вашого облікового запису, а не маркетингові листи.

      ## 14. Видалення даних

      Ви можете надіслати запит на видалення вашого облікового запису та повʼязаних даних, звернувшись на support@ingantt.com. Після отримання дійсного запиту ми видалимо інформацію вашого облікового запису з наших серверів. Зверніть увагу:

      - Файли, збережені у вашому Google Drive, управляються вами і не зазнають впливу при видаленні облікового запису
      - Файли, збережені локально на вашому пристрої, не зазнають впливу при видаленні облікового запису
      - Ми можемо зберігати певні дані, як це вимагається законом або для законних бізнес-цілей (наприклад, записи про платежі)

      ## 15. Доступність Сервісу

      ### 15.1 Відсутність гарантії доступності

      Ми прагнемо підтримувати доступність Додатку, але не гарантуємо безперебійну або безпомилкову роботу. Додаток, включаючи функції, що залежать від сервера (конвертація файлів, створення проектів за допомогою ШІ), може бути тимчасово недоступний через технічне обслуговування, оновлення або обставини, що знаходяться поза нашим контролем.

      ### 15.2 Зміни Сервісу

      Ми залишаємо за собою право змінювати, призупиняти або припиняти будь-яку частину Сервісу в будь-який час, з або без попередження. Ми докладемо розумних зусиль для повідомлення користувачів про суттєві зміни.

      ## 16. Відмова від гарантій

      ДОДАТОК НАДАЄТЬСЯ "ЯК Є" ТА "ЯК ДОСТУПНО" БЕЗ БУДЬ-ЯКИХ ГАРАНТІЙ, ЯВНИХ АБО НЕЯВНИХ, ВКЛЮЧАЮЧИ, АЛЕ НЕ ОБМЕЖУЮЧИСЬ, НЕЯВНИМИ ГАРАНТІЯМИ КОМЕРЦІЙНОЇ ПРИДАТНОСТІ, ПРИДАТНОСТІ ДЛЯ ПЕВНОЇ МЕТИ ТА НЕПОРУШЕННЯ ПРАВ.

      МИ НЕ ГАРАНТУЄМО, ЩО:

      - ДОДАТОК ВІДПОВІДАТИМЕ ВАШИМ КОНКРЕТНИМ ВИМОГАМ
      - ДОДАТОК БУДЕ БЕЗПЕРЕБІЙНИМ, СВОЄЧАСНИМ, БЕЗПЕЧНИМ АБО БЕЗПОМИЛКОВИМ
      - РЕЗУЛЬТАТИ ПЛАНУВАННЯ, АНАЛІЗУ КРИТИЧНОГО ШЛЯХУ АБО ВИРІВНЮВАННЯ РЕСУРСІВ БУДУТЬ ТОЧНИМИ АБО ПОВНИМИ
      - КОНТЕНТ, ЗГЕНЕРОВАНИЙ ШІ, БУДЕ ТОЧНИМ, ПРИДАТНИМ АБО ВІЛЬНИМ ВІД ПОМИЛОК
      - КОНВЕРТАЦІЯ ФАЙЛІВ ЗБЕРЕЖЕ ВСІ ДАНІ З ІДЕАЛЬНОЮ ТОЧНІСТЮ

      ## 17. Обмеження відповідальності

      В МАКСИМАЛЬНІЙ МІРІ, ДОЗВОЛЕНІЙ ЧИННИМ ЗАКОНОДАВСТВОМ, НІ ЗА ЯКИХ ОБСТАВИН INGANTT DEVELOPMENT НЕ НЕСЕ ВІДПОВІДАЛЬНОСТІ ЗА БУДЬ-ЯКІ НЕПРЯМІ, ВИПАДКОВІ, ОСОБЛИВІ, НАСЛІДКОВІ АБО ШТРАФНІ ЗБИТКИ, ВКЛЮЧАЮЧИ, АЛЕ НЕ ОБМЕЖУЮЧИСЬ:

      - ВТРАТУ ДАНИХ АБО ФАЙЛІВ ПРОЕКТІВ
      - ПЕРЕРИВАННЯ БІЗНЕСУ АБО ВТРАТУ ПРИБУТКУ
      - ЗБИТКИ, ЩО ВИНИКАЮТЬ ВНАСЛІДОК ПОКЛАДАННЯ НА РЕЗУЛЬТАТИ ПЛАНУВАННЯ АБО КОНТЕНТ, ЗГЕНЕРОВАНИЙ ШІ
      - ЗБИТКИ, ЩО ВИНИКАЮТЬ ВНАСЛІДОК ЗБОЇВ СТОРОННІХ СЕРВІСІВ

      НАША ЗАГАЛЬНА СУКУПНА ВІДПОВІДАЛЬНІСТЬ НЕ ПЕРЕВИЩУЄ СУМУ, СПЛАЧЕНУ ВАМИ ЗА ДОДАТОК ПРОТЯГОМ ДВАНАДЦЯТИ (12) МІСЯЦІВ, ЩО ПЕРЕДУЮТЬ ПРЕТЕНЗІЇ.

      ## 18. Відшкодування

      Ви зобовʼязуєтесь захищати, відшкодовувати та звільняти від відповідальності Ingantt Development від будь-яких претензій, збитків, втрат, зобовʼязань та витрат (включаючи обґрунтовані гонорари адвокатів), що виникають внаслідок:

      - Вашого використання Додатку
      - Вашого порушення цих Умов
      - Вашого порушення будь-яких чинних законів або прав третіх сторін
      - Вашого Користувацького контенту

      ## 19. Припинення

      ### 19.1 З вашого боку

      Ви можете припинити використання Додатку в будь-який час. Якщо у вас є веб-підписка, ви можете скасувати її, дотримуючись процедур, описаних у Розділі 4.2 вище.

      ### 19.2 З нашого боку

      Ми можемо призупинити або припинити ваш доступ до Додатку в будь-який час, з або без причини, з або без попередження, включаючи у випадку порушення цих Умов.

      ### 19.3 Наслідки припинення

      Після припинення ваша ліцензія на використання Додатку анулюється. Ваші локально збережені файли проектів залишаються на вашому пристрої. Файли, збережені в Google Drive, залишаються у вашому обліковому записі Google Drive.

      ## 20. Зміни Умов

      Ми можемо час від часу оновлювати ці Умови. Ми повідомлятимемо користувачів про суттєві зміни, оновлюючи дату "Last Updated" та, де це можливо, через повідомлення в Додатку. Подальше використання Додатку після змін означає прийняття оновлених Умов.

      ## 21. Застосовне право та спори

      Ці Умови регулюються та тлумачаться відповідно до чинного законодавства. Будь-які спори, що виникають з цих Умов або вашого використання Додатку, вирішуються шляхом добросовісних переговорів. Якщо переговори не вдадуться, спори передаються на обовʼязковий арбітраж відповідно до правил відповідного арбітражного органу юрисдикції, де зареєстровано Ingantt Development.

      ## 22. Загальні положення

      ### 22.1 Повнота угоди

      Ці Умови разом з нашою [Політикою конфіденційності](privacy_policy.html) становлять повну угоду між вами та Ingantt Development щодо Додатку.

      ### 22.2 Подільність

      Якщо будь-яке положення цих Умов визнано недійсним, решта положень залишаються чинними в повному обсязі.

      ### 22.3 Відмова від права

      Наша невдала спроба реалізувати будь-яке право або положення цих Умов не є відмовою від такого права або положення.

      ### 22.4 Передача прав

      Ви не можете передавати або переуступати свої права за цими Умовами без нашої попередньої письмової згоди. Ми можемо передавати наші права без обмежень.

      ## 23. Звʼязатися з нами

      Якщо у вас виникли запитання щодо цих Умов, будь ласка, звʼяжіться з нами:

      - **Email:** support@ingantt.com
      - **Веб-сайт:** https://ingantt.com
      - **Документація:** https://docs.ingantt.com

