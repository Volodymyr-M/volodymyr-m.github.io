faq:
  title: Відкриття .MPP файлів — запитання, коли ви застрягли
  items:
    - question: Як відкрити .MPP файл?
      answer: Найшвидший шлях — відкрити файл в Ingantt. .MPP файл — це рідний бінарний формат Microsoft Project, і за замовчуванням лише Microsoft Project відкриває його чисто, але MS Project працює лише на Windows, коштує кількасот доларів і це навряд те, що ви хочете купувати заради одного файлу. Ingantt імпортує .MPP напряму, працює на Mac, iPhone, iPad, Windows, Android та в браузері, і пропонує 7-денну безкоштовну пробну версію без кредитної картки.
    - question: Як відкрити .MPP файл на Mac?
      answer: Microsoft Project не працює на macOS — версії для Mac не існує. Тож відповідь не "встановіть Project на Mac", а "користуйтеся чимось, що нативно читає .MPP на Mac". У Ingantt є нативний додаток macOS у Mac App Store, який відкриває .MPP файли напряму на Apple Silicon та Intel Mac. Завантажте, відкрийте .MPP — і ви побачите повну діаграму Ганта із завданнями, залежностями та критичним шляхом.
    - question: Чи можу я відкрити .MPP файл на iPhone або iPad?
      answer: Так. Ingantt має нативні iOS-додатки для iPhone та iPad в App Store, які відкривають .MPP та MS Project XML файли напряму. На iPad ви отримаєте широку часову шкалу з масштабуванням жестами та сенсорною прокруткою — найближче до досвіду десктопного Microsoft Project на iOS-пристрої.
    - question: Чи можу я зберегти .MPP файл після відкриття?
      answer: Так. Ingantt зберігає проекти у рідному форматі .MPP від Microsoft Project, а також .XML, PDF і PNG. Ви можете відкрити .MPP на Mac, iPhone або в браузері, внести зміни, зберегти як .MPP і передати файл колезі, який досі користується Microsoft Project — він відкриє його як завжди. Якщо ви лише хочете подивитися на діаграму без редагування, наша сторінка <a href="/gantt-viewer">Переглядача Ганта</a> охоплює випадок лише для перегляду.
