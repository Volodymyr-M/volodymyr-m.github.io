<html lang="vi"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <meta http-equiv="Content-Language" content="vi"> <title>Ingantt</title> <link rel="stylesheet" href="/styles/styles.css"> <link rel="stylesheet" href="/styles/styles-windows.css"> <style> body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: var(--background); } .card { background: var(--surface); box-shadow: var(--shadow-lg); border-radius: var(--radius-md); padding: var(--spacing-lg); text-align: center; max-width: 465px; width: 100%; } .illustration img { max-width: 100%; height: auto; margin-bottom: var(--spacing-md); } .card p { color: var(--text-primary); opacity: 0.8; margin-bottom: var(--spacing-sm); line-height: 1.6; } .card a { color: var(--primary-color); text-decoration: none; transition: color var(--transition-fast); } .card a:hover { color: var(--primary-hover); } .logo { display: flex; justify-content: center; align-items: center; margin-top: var(--spacing-md); } .issue { display: none; } </style> <link rel="alternate" hreflang="en" href="https://ingantt.com//desktop_callback.html" /> <link rel="alternate" hreflang="de" href="https://ingantt.com/de//desktop_callback.html" /> <link rel="alternate" hreflang="es" href="https://ingantt.com/es//desktop_callback.html" /> <link rel="alternate" hreflang="fr" href="https://ingantt.com/fr//desktop_callback.html" /> <link rel="alternate" hreflang="hi" href="https://ingantt.com/hi//desktop_callback.html" /> <link rel="alternate" hreflang="id" href="https://ingantt.com/id//desktop_callback.html" /> <link rel="alternate" hreflang="it" href="https://ingantt.com/it//desktop_callback.html" /> <link rel="alternate" hreflang="ja" href="https://ingantt.com/ja//desktop_callback.html" /> <link rel="alternate" hreflang="ko" href="https://ingantt.com/ko//desktop_callback.html" /> <link rel="alternate" hreflang="ms" href="https://ingantt.com/ms//desktop_callback.html" /> <link rel="alternate" hreflang="pl" href="https://ingantt.com/pl//desktop_callback.html" /> <link rel="alternate" hreflang="pt" href="https://ingantt.com/pt//desktop_callback.html" /> <link rel="alternate" hreflang="th" href="https://ingantt.com/th//desktop_callback.html" /> <link rel="alternate" hreflang="tr" href="https://ingantt.com/tr//desktop_callback.html" /> <link rel="alternate" hreflang="uk" href="https://ingantt.com/uk//desktop_callback.html" /> <link rel="alternate" hreflang="vi" href="https://ingantt.com/vi//desktop_callback.html" /> <link rel="alternate" hreflang="zh" href="https://ingantt.com/zh//desktop_callback.html" /> <base href="../"> <script type="text/javascript"> const cookieName = "userLang"; function setLanguageCookie(language, days = 180) { const date = new Date(); date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000)); document.cookie = `${cookieName}=${language}; expires=${date.toUTCString()}; path=/`; } function getLanguageCookieValue() { const value = `; ${document.cookie}`; const parts = value.split(`; ${cookieName}=`); if (parts.length === 2) return parts.pop().split(';').shift(); } const languageFolders = { 'en': '/', 'de': '/de/', 'es': '/es/', 'fr': '/fr/', 'hi': '/hi/', 'id': '/id/', 'it': '/it/', 'ja': '/ja/', 'ko': '/ko/', 'ms': '/ms/', 'pl': '/pl/', 'pt': '/pt/', 'th': '/th/', 'tr': '/tr/', 'uk': '/uk/', 'vi': '/vi/', 'zh': '/zh/', }; if (window.location.pathname.split('/').length == 2) { const savedLang = getLanguageCookieValue(); if (savedLang) { if (savedLang != 'en') { const redirectUrl = languageFolders[savedLang] + window.location.pathname.split('/')[1] + window.location.search + window.location.hash; if (redirectUrl) { window.location.replace(redirectUrl); } } } else { const userLang = navigator.language || navigator.userLanguage; const langCode = userLang.split('-')[0]; const redirectUrl = languageFolders[langCode] + window.location.pathname.split('/')[1] + window.location.search + window.location.hash; if (redirectUrl) { setLanguageCookie(langCode); window.location.replace(redirectUrl); } } } function changeLanguage(languageCode) { setLanguageCookie(languageCode); } </script> </head> <body> <div class="card"> <div class="illustration"> <img src="/images/look_up.png" alt="Look Up"> </div> <h2>Nhấp "Open" trong hộp thoại phía trên</h2> <p class="issue">Đã nhấp? Bạn có thể đóng trang này</p> <p class="issue">Gặp sự cố? <a id="redirectLink" href="#" onclick="redirectToDesktop()">Thử lại</a></p> <div class="logo"><img src="/images/logo.png" alt="Ingantt Logo" class="logo-img"> <span class="logo-text">Ingantt</span></div> <button id="theme-toggle" style="display: none;"> <i class="fa-sun"></i> </button> </div> <script type="text/javascript"> let appLinkUrl = ''; function redirectToDesktop() { if (appLinkUrl === '') { const appLinkScheme = "ingantt"; const appLinkAuthority = "ingantt"; appLinkUrl = `${appLinkScheme}://${appLinkAuthority}/callback${window.location.search}`; const linkElement = document.getElementById('redirectLink'); if (linkElement) { linkElement.href = appLinkUrl; linkElement.removeAttribute('onclick'); } } setTimeout(() => { window.location.href = appLinkUrl; }, 100); return false; } window.onload = redirectToDesktop; document.addEventListener('DOMContentLoaded', function() { setTimeout(function() { var issueElement = document.querySelectorAll('.issue'); if (issueElement) { issueElement.forEach(t => t.style.display = 'block'); } }, 7000); }); </script> <script src="/js/main.js"></script> </body> </html>
